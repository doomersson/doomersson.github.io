<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanki — Paint Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08060e;
    --panel: #100d1c;
    --border: #221c38;
    --accent: #c97fff;
    --accent2: #ff4dca;
    --accent3: #7fd4ff;
    --text: #d8cef5;
    --dim: #5a4f72;
    --glow: 0 0 24px rgba(201,127,255,0.35);
    --glow2: 0 0 24px rgba(255,77,202,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background blobs */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 20%, rgba(120,50,200,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 70%, rgba(255,50,180,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 100%, rgba(100,180,255,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,127,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,127,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* TOP BAR */
  .topbar {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .logo span {
    color: var(--accent);
  }

  .divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }

  .search-wrap {
    display: flex;
    gap: 10px;
    flex: 1;
    min-width: 220px;
  }

  .search-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(201,127,255,0.1);
  }

  .search-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 9px 20px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }

  .search-btn:hover {
    background: rgba(201,127,255,0.1);
    box-shadow: var(--glow);
  }

  .status {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: blink 1.8s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.15; }
  }

  /* HERO */
  .hero {
    padding: 32px 32px 0;
    animation: fadeDown 0.5s 0.05s ease both;
  }

  .player-name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 40px rgba(201,127,255,0.5), 0 0 80px rgba(201,127,255,0.2);
    line-height: 1;
  }

  .player-sub {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* STATS ROW */
  .stats-row {
    display: flex;
    gap: 0;
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    animation: fadeDown 0.5s 0.1s ease both;
  }

  .stat-block {
    padding: 0 28px 0 0;
    margin-right: 28px;
    border-right: 1px solid var(--border);
  }

  .stat-block:last-child {
    border-right: none;
  }

  .stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 5px;
  }

  /* SORT BAR */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    animation: fadeDown 0.5s 0.12s ease both;
  }

  .sort-lbl {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .sort-btn:hover, .sort-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,127,255,0.07);
  }

  /* GALLERY */
  .gallery {
    flex: 1;
    padding: 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    animation: fadeUp 0.5s 0.15s ease both;
  }

  .paint-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: default;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: cardIn 0.4s ease both;
  }

  .paint-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .paint-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), var(--glow);
  }

  .paint-card:hover::before { opacity: 1; }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .paint-img-wrap {
    width: 96px;
    height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .paint-img {
    width: 96px;
    height: 96px;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    transition: transform 0.3s, filter 0.3s;
  }

  .paint-card:hover .paint-img {
    transform: scale(1.08);
    filter: drop-shadow(0 6px 18px rgba(201,127,255,0.4));
  }

  .paint-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.3;
  }

  .paint-grade {
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .paint-stats {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 2px;
  }

  .pstat {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
  }

  .pstat .k { color: var(--dim); letter-spacing: 1px; text-transform: uppercase; }
  .pstat .v { color: var(--accent3); font-family: 'Orbitron', sans-serif; font-size: 10px; }
  .pstat .v.zero { color: var(--dim); }

  /* RANK BADGE on card */
  .rank-num {
    position: absolute;
    top: 8px;
    right: 10px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* EMPTY STATE */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--dim);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .empty .big {
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    color: var(--border);
    display: block;
    margin-bottom: 16px;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger cards */
  .paint-card:nth-child(1)  { animation-delay: 0.00s; }
  .paint-card:nth-child(2)  { animation-delay: 0.04s; }
  .paint-card:nth-child(3)  { animation-delay: 0.08s; }
  .paint-card:nth-child(4)  { animation-delay: 0.12s; }
  .paint-card:nth-child(5)  { animation-delay: 0.16s; }
  .paint-card:nth-child(6)  { animation-delay: 0.20s; }
  .paint-card:nth-child(7)  { animation-delay: 0.24s; }
  .paint-card:nth-child(8)  { animation-delay: 0.28s; }
  .paint-card:nth-child(9)  { animation-delay: 0.32s; }
  .paint-card:nth-child(10) { animation-delay: 0.36s; }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="logo">Tanki<span>.</span>Paints</div>
    <div class="divider"></div>
    <div class="search-wrap">
      <input class="search-input" id="userInput" type="text" placeholder="Username..." value="ufo2">
      <button class="search-btn" onclick="loadProfile()">Search</button>
    </div>
    <div class="status" id="statusMsg">
      <div class="dot" style="background:var(--accent2)"></div>
      <span>Loaded — ufo2</span>
    </div>
  </div>

  <div class="hero" id="heroSection">
    <div class="player-name" id="playerName">ufo2</div>
    <div class="player-sub">Paint Collection · EU Server</div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-block">
      <div class="stat-val" id="statCount">0</div>
      <div class="stat-lbl">Paints Used</div>
    </div>
    <div class="stat-block">
      <div class="stat-val" id="statScore">0</div>
      <div class="stat-lbl">Total Score</div>
    </div>
    <div class="stat-block">
      <div class="stat-val" id="statTime">0h</div>
      <div class="stat-lbl">Time Played</div>
    </div>
    <div class="stat-block">
      <div class="stat-val" id="statTop">—</div>
      <div class="stat-lbl">Top Paint</div>
    </div>
  </div>

  <div class="sort-bar">
    <span class="sort-lbl">Sort by</span>
    <button class="sort-btn active" onclick="setSort('name', this)">Name</button>
    <button class="sort-btn" onclick="setSort('score', this)">Score</button>
    <button class="sort-btn" onclick="setSort('time', this)">Time</button>
    <button class="sort-btn" onclick="setSort('grade', this)">Grade</button>
  </div>

  <div class="gallery" id="gallery"></div>

</div>

<script>
let currentPaints = [];
let currentSort = 'name';

const PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

function tnkToWebp(url) {
  return url ? url.replace(/\.tnk$/, '.webp') : '';
}

function gradeStars(grade) {
  if (grade < 0) return '★★★★★';
  const f = Math.max(0, Math.min(5, grade));
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function formatTime(ms) {
  if (!ms) return '0h';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'h ' + (m % 60) + 'm';
  if (m > 0) return m + 'm';
  return s + 's';
}

function formatMs(ms) {
  if (!ms) return '—';
  const m = Math.floor(ms / 60000);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'h ' + (m % 60) + 'm';
  return m + 'm';
}

function setSort(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function getSorted(paints) {
  return [...paints].sort((a, b) => {
    if (currentSort === 'name')  return a.name.localeCompare(b.name);
    if (currentSort === 'score') return b.scoreEarned - a.scoreEarned;
    if (currentSort === 'time')  return b.timePlayed - a.timePlayed;
    if (currentSort === 'grade') return b.grade - a.grade;
    return 0;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const sorted = getSorted(currentPaints);

  if (sorted.length === 0) {
    gallery.innerHTML = '<div class="empty"><span class="big">∅</span>No paints found</div>';
    return;
  }

  gallery.innerHTML = sorted.map((p, i) => `
    <div class="paint-card">
      <div class="rank-num">#${i + 1}</div>
      <div class="paint-img-wrap">
        <img class="paint-img" src="${tnkToWebp(p.imageUrl)}" alt="${p.name}" onerror="this.style.opacity=0.2">
      </div>
      <div class="paint-name">${p.name}</div>
      <div class="paint-grade">${gradeStars(p.grade)}</div>
      <div class="paint-stats">
        <div class="pstat">
          <span class="k">Score</span>
          <span class="v ${p.scoreEarned === 0 ? 'zero' : ''}">${p.scoreEarned > 0 ? p.scoreEarned.toLocaleString() : '—'}</span>
        </div>
        <div class="pstat">
          <span class="k">Time</span>
          <span class="v ${p.timePlayed === 0 ? 'zero' : ''}">${p.timePlayed > 0 ? formatMs(p.timePlayed) : '—'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderStats(paints, name) {
  const totalScore = paints.reduce((s, p) => s + p.scoreEarned, 0);
  const totalTime  = paints.reduce((s, p) => s + p.timePlayed, 0);
  const topPaint   = [...paints].sort((a, b) => b.scoreEarned - a.scoreEarned)[0];

  document.getElementById('playerName').textContent = name;
  document.getElementById('statCount').textContent  = paints.length;
  document.getElementById('statScore').textContent  = totalScore > 0 ? totalScore.toLocaleString() : '0';
  document.getElementById('statTime').textContent   = totalTime > 0 ? formatMs(totalTime) : '0h';
  document.getElementById('statTop').textContent    = topPaint && topPaint.scoreEarned > 0 ? topPaint.name : '—';
}

async function loadProfile() {
  const user = document.getElementById('userInput').value.trim() || 'ufo2';
  const statusEl = document.getElementById('statusMsg');
  statusEl.innerHTML = '<div class="dot"></div><span>Fetching ' + user + '...</span>';

  try {
    const apiUrl = `https://ratings.tankionline.com/api/eu/profile/?user=${encodeURIComponent(user)}&lang=en`;
    const res = await fetch(PROXY + apiUrl);
    const data = await res.json();
    if (data.responseType !== 'OK') throw new Error('User not found');

    currentPaints = data.response.paintsPlayed || [];
    renderStats(currentPaints, data.response.name);
    renderGallery();
    statusEl.innerHTML = `<div class="dot" style="background:var(--accent2)"></div><span>Loaded — ${data.response.name}</span>`;
  } catch (e) {
    statusEl.innerHTML = `<div class="dot" style="background:#f44"></div><span>Error: ${e.message}</span>`;
  }
}

// Allow Enter key
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadProfile();
});

// Boot with embedded data
const embedded = {"response":{"paintsPlayed":[{"grade":-1,"id":920004704216,"imageUrl":"https://s.eu.tankionline.com/0/0/345/373/30665401773004/image.tnk","name":"Black","properties":null,"scoreEarned":0,"timePlayed":0},{"grade":-1,"id":920004703610,"imageUrl":"https://s.eu.tankionline.com/0/114/146/147/27006221410004/image.tnk","name":"Holiday","properties":null,"scoreEarned":0,"timePlayed":0}],"name":"ufo2"},"responseType":"OK"};
currentPaints = embedded.response.paintsPlayed;
renderStats(currentPaints, embedded.response.name);
renderGallery();
</script>
</body>
</html>
