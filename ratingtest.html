<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanki Online — ufo2 Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b14;
    --panel: #0d1526;
    --border: #1a2d52;
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --text: #c8ddf5;
    --dim: #4a6080;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(255,107,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,80,140,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,100,0,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline effect */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.6s ease both;
  }

  .rank-badge {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0d2040, #1a3a6e);
    border: 2px solid var(--accent);
    box-shadow: var(--glow);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    flex-shrink: 0;
  }

  .player-info h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0,212,255,0.5);
  }

  .player-info .subtitle {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .hstat {
    text-align: right;
  }

  .hstat .val {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }

  .hstat .lbl {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* GEAR SCORE BAR */
  .gear-section {
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .gear-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .gear-label span:last-child {
    color: var(--accent2);
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
  }

  .gear-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .gear-fill {
    height: 100%;
    width: 99%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    box-shadow: 0 0 10px rgba(0,212,255,0.5);
    animation: barGrow 1s 0.5s ease both;
    transform-origin: left;
  }

  @keyframes barGrow {
    from { transform: scaleX(0); }
    to { transform: scaleX(1); }
  }

  /* GRID LAYOUT */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }

  /* PANEL */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* EQUIPMENT CARD */
  .eq-list { display: flex; flex-direction: column; gap: 14px; }

  .eq-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    transition: border-color 0.2s, background 0.2s;
  }

  .eq-card:hover {
    border-color: var(--accent);
    background: rgba(0,212,255,0.07);
  }

  .eq-img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(0,212,255,0.3));
  }

  .eq-info .name {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    color: #fff;
    letter-spacing: 1px;
  }

  .eq-info .grade {
    font-size: 11px;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: 1px;
  }

  .grade-stars {
    color: var(--accent2);
    font-size: 10px;
    margin-top: 2px;
  }

  /* MODES TABLE */
  .modes-table { width: 100%; border-collapse: collapse; font-size: 12px; }

  .modes-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
  }

  .modes-table td {
    padding: 9px 8px;
    border-bottom: 1px solid rgba(26,45,82,0.5);
    color: var(--text);
  }

  .modes-table tr:last-child td { border-bottom: none; }

  .modes-table tr:hover td { background: rgba(0,212,255,0.03); }

  .mode-tag {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--accent);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .zero { color: var(--dim); }

  /* SUPPLIES GRID */
  .supplies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 10px;
  }

  .supply-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 6px 8px;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
  }

  .supply-item:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-2px);
  }

  .supply-img {
    width: 38px;
    height: 38px;
    object-fit: contain;
    filter: drop-shadow(0 0 4px rgba(0,212,255,0.2));
  }

  .supply-name {
    font-size: 9px;
    text-align: center;
    color: var(--dim);
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  .supply-uses {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px;
    color: var(--accent2);
  }

  /* PAINTS */
  .paints-list { display: flex; gap: 14px; flex-wrap: wrap; }

  .paint-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    flex: 1;
    min-width: 100px;
    transition: border-color 0.2s;
  }

  .paint-card:hover { border-color: var(--accent); }

  .paint-img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }

  .paint-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
  }

  /* RATING PANEL */
  .rating-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .rating-box {
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
    text-align: center;
  }

  .rating-box .r-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .rating-box .r-lbl {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .rating-box .r-val.unranked { color: var(--dim); font-size: 14px; }

  /* DRONE */
  .drone-card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: rgba(0,212,255,0.03);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px 18px;
  }

  .drone-img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 0 10px rgba(0,212,255,0.4));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .drone-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
  }

  /* FETCH CONTROLS */
  .fetch-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
    flex-wrap: wrap;
  }

  .fetch-input {
    flex: 1;
    min-width: 180px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }

  .fetch-input:focus { border-color: var(--accent); }

  .fetch-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 24px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
  }

  .fetch-btn:hover {
    background: rgba(0,212,255,0.1);
    box-shadow: var(--glow);
  }

  .status-msg {
    font-size: 12px;
    padding: 10px 16px;
    color: var(--dim);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel:nth-child(1) { animation-delay: 0.05s; }
  .panel:nth-child(2) { animation-delay: 0.10s; }
  .panel:nth-child(3) { animation-delay: 0.15s; }
  .panel:nth-child(4) { animation-delay: 0.20s; }
  .panel:nth-child(5) { animation-delay: 0.25s; }
  .panel:nth-child(6) { animation-delay: 0.30s; }

  #main-content { display: none; }
  #main-content.visible { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="fetch-bar">
    <input class="fetch-input" id="userInput" type="text" placeholder="Enter username (e.g. ufo2)" value="ufo2">
    <button class="fetch-btn" onclick="loadProfile()">Load Profile</button>
    <div class="status-msg" id="statusMsg"><div class="dot"></div> Loading...</div>
  </div>

  <div id="main-content">
    <!-- HEADER -->
    <header>
      <div class="rank-badge" id="rankBadge">1</div>
      <div class="player-info">
        <h1 id="playerName">—</h1>
        <div class="subtitle">Tanki Online — EU Server</div>
      </div>
      <div class="header-stats">
        <div class="hstat">
          <div class="val" id="hKills">0</div>
          <div class="lbl">Kills</div>
        </div>
        <div class="hstat">
          <div class="val" id="hDeaths">0</div>
          <div class="lbl">Deaths</div>
        </div>
        <div class="hstat">
          <div class="val" id="hScore">0</div>
          <div class="lbl">Score</div>
        </div>
        <div class="hstat">
          <div class="val" id="hGolds">0</div>
          <div class="lbl">Golds</div>
        </div>
      </div>
    </header>

    <!-- GEAR SCORE -->
    <div class="gear-section">
      <div class="gear-label">
        <span>Gear Score</span>
        <span id="gearVal">99</span>
      </div>
      <div class="gear-track">
        <div class="gear-fill" id="gearFill"></div>
      </div>
    </div>

    <!-- ROW 1 -->
    <div class="grid">
      <!-- HULL -->
      <div class="panel">
        <div class="panel-title">Hull</div>
        <div class="eq-list" id="hullList"></div>
      </div>
      <!-- TURRET -->
      <div class="panel">
        <div class="panel-title">Turret</div>
        <div class="eq-list" id="turretList"></div>
      </div>
      <!-- DRONE -->
      <div class="panel">
        <div class="panel-title">Drone</div>
        <div id="droneSection"></div>
      </div>
    </div>

    <!-- ROW 2 -->
    <div class="grid">
      <!-- PAINTS -->
      <div class="panel">
        <div class="panel-title">Paints Used</div>
        <div class="paints-list" id="paintsList"></div>
      </div>
      <!-- RATING -->
      <div class="panel">
        <div class="panel-title">Rating</div>
        <div class="rating-grid" id="ratingGrid"></div>
      </div>
    </div>

    <!-- GAME MODES -->
    <div class="panel" style="margin-bottom:20px;">
      <div class="panel-title">Game Modes</div>
      <table class="modes-table">
        <thead>
          <tr>
            <th>Mode</th>
            <th>Type</th>
            <th>Score</th>
            <th>Time Played</th>
          </tr>
        </thead>
        <tbody id="modesBody"></tbody>
      </table>
    </div>

    <!-- SUPPLIES -->
    <div class="panel">
      <div class="panel-title">Supplies</div>
      <div class="supplies-grid" id="suppliesGrid"></div>
    </div>
  </div>

</div>

<script>
function tnkToWebp(url) {
  return url ? url.replace(/\.tnk$/, '.webp') : '';
}

function gradeStars(grade) {
  if (grade < 0) return '<span class="grade-stars">★★★★★ MAX</span>';
  const filled = Math.max(0, Math.min(5, grade));
  return '<span class="grade-stars">' + '★'.repeat(filled) + '☆'.repeat(5 - filled) + '</span>';
}

function formatTime(ms) {
  if (!ms) return '<span class="zero">—</span>';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return h + 'h ' + (m % 60) + 'm';
  if (m > 0) return m + 'm';
  return s + 's';
}

function renderEquipment(items, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item => `
    <div class="eq-card">
      <img class="eq-img" src="${tnkToWebp(item.imageUrl)}" alt="${item.name}" onerror="this.style.opacity=0.3">
      <div class="eq-info">
        <div class="name">${item.name}</div>
        ${gradeStars(item.grade)}
        <div class="grade">Score: <span style="color:var(--accent)">${item.scoreEarned.toLocaleString()}</span></div>
      </div>
    </div>
  `).join('');
}

function renderDrone(drones) {
  const el = document.getElementById('droneSection');
  if (!drones || drones.length === 0) { el.innerHTML = '<span style="color:var(--dim)">No drone equipped</span>'; return; }
  const d = drones[0];
  el.innerHTML = `
    <div class="drone-card">
      <img class="drone-img" src="${tnkToWebp(d.imageUrl)}" alt="${d.name}" onerror="this.style.opacity=0.3">
      <div>
        <div class="drone-name">${d.name}</div>
        ${gradeStars(d.grade)}
      </div>
    </div>
  `;
}

function renderPaints(paints) {
  const el = document.getElementById('paintsList');
  el.innerHTML = paints.map(p => `
    <div class="paint-card">
      <img class="paint-img" src="${tnkToWebp(p.imageUrl)}" alt="${p.name}" onerror="this.style.opacity=0.3">
      <div class="paint-name">${p.name}</div>
      ${gradeStars(p.grade)}
    </div>
  `).join('');
}

function renderRating(rating) {
  const el = document.getElementById('ratingGrid');
  const entries = [
    { key: 'score', label: 'Score' },
    { key: 'kills', label: 'Kills' },
    { key: 'efficiency', label: 'Efficiency' },
    { key: 'golds', label: 'Golds' },
  ];
  el.innerHTML = entries.map(e => {
    const r = rating[e.key];
    const pos = r && r.position > 0 ? '#' + r.position.toLocaleString() : null;
    return `
      <div class="rating-box">
        <div class="r-val ${pos ? '' : 'unranked'}">${pos || 'Unranked'}</div>
        <div class="r-lbl">${e.label}</div>
      </div>`;
  }).join('');
}

function renderModes(modes) {
  const tbody = document.getElementById('modesBody');
  tbody.innerHTML = modes.map(m => `
    <tr>
      <td>${m.name}</td>
      <td><span class="mode-tag">${m.type}</span></td>
      <td class="${m.scoreEarned === 0 ? 'zero' : ''}">${m.scoreEarned.toLocaleString() || '—'}</td>
      <td>${formatTime(m.timePlayed)}</td>
    </tr>
  `).join('');
}

function renderSupplies(supplies) {
  const el = document.getElementById('suppliesGrid');
  el.innerHTML = supplies.map(s => `
    <div class="supply-item" title="${s.name}">
      <img class="supply-img" src="${tnkToWebp(s.imageUrl)}" alt="${s.name}" onerror="this.style.opacity=0.3">
      <div class="supply-name">${s.name}</div>
      <div class="supply-uses">${s.usages > 0 ? s.usages : '—'}</div>
    </div>
  `).join('');
}

function renderProfile(data) {
  const r = data.response;

  document.getElementById('rankBadge').textContent = r.rank;
  document.getElementById('playerName').textContent = r.name;
  document.getElementById('hKills').textContent = r.kills.toLocaleString();
  document.getElementById('hDeaths').textContent = r.deaths.toLocaleString();
  document.getElementById('hScore').textContent = r.score.toLocaleString();
  document.getElementById('hGolds').textContent = r.caughtGolds.toLocaleString();

  const gs = r.gearScore;
  document.getElementById('gearVal').textContent = gs;
  document.getElementById('gearFill').style.width = Math.min(100, gs) + '%';

  renderEquipment(r.hullsPlayed, 'hullList');
  renderEquipment(r.turretsPlayed, 'turretList');
  renderDrone(r.dronesPlayed);
  renderPaints(r.paintsPlayed);
  renderRating(r.rating);
  renderModes(r.modesPlayed);
  renderSupplies(r.suppliesUsage);

  document.getElementById('main-content').classList.add('visible');
}

async function loadProfile() {
  const user = document.getElementById('userInput').value.trim() || 'ufo2';
  const status = document.getElementById('statusMsg');
  document.getElementById('main-content').classList.remove('visible');
  status.innerHTML = '<div class="dot"></div> Fetching ' + user + '...';

  try {
    const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=https://ratings.tankionline.com/api/eu/profile/?user=${encodeURIComponent(user)}&lang=en`);
    const data = await res.json();
    if (data.responseType !== 'OK') throw new Error('Bad response');
    renderProfile(data);
    status.innerHTML = '<div class="dot" style="background:var(--accent2)"></div> Loaded — ' + data.response.name;
  } catch (e) {
    status.innerHTML = '<div class="dot" style="background:#f44"></div> Error: ' + e.message;
  }
