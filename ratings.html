<!DOCTYPE html>
<html lang="en" data-theme="dark">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link
         href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap"
         rel="stylesheet"
      />
      <link
         href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
         rel="stylesheet"
      />
      <title>Tanki Ratings</title>
      <style>
         :root {
            --font-family: "Rubik", sans-serif;
            --radius-small: 12px;
            --radius-medium: 16px;
            --radius-large: 24px;
            --radius-extra-large: 28px;
            --radius-pill: 9999px;
            --motion-easing: cubic-bezier(0.2, 0, 0, 1);
            --motion-duration: 250ms;
            --color-lime: #76ff33;
            --color-deep-blue: #001926;
            --color-pale-blue: #bfd5ff;
            --color-red: #ff6666;
            --color-surface: #061e2e;
            --color-surface-container: #0c2638;
            --color-surface-container-high: #153247;
         }
         [data-theme="dark"] {
            --md-sys-color-background: var(--color-deep-blue);
            --md-sys-color-on-background: #e1e3df;
            --md-sys-color-surface: var(--color-surface);
            --md-sys-color-on-surface: #e1e3df;
            --md-sys-color-surface-container: var(--color-surface-container);
            --md-sys-color-surface-container-high: var(--color-surface-container-high);
            --md-sys-color-primary: var(--color-lime);
            --md-sys-color-on-primary: #00390a;
            --md-sys-color-primary-container: #005313;
            --md-sys-color-on-primary-container: #96ff68;
            --md-sys-color-secondary: var(--color-pale-blue);
            --md-sys-color-on-secondary: #003256;
            --md-sys-color-secondary-container: #233e52;
            --md-sys-color-on-secondary-container: #d6e8cb;
            --md-sys-color-outline: #586c78;
            --md-sys-color-outline-variant: #344855;
            --md-sys-color-error: var(--color-red);
            --md-sys-color-on-error: #690005;
            --chart-increase: var(--color-lime);
            --chart-decrease: var(--color-red);
            --elevation-shadow: 0 1px 3px 1px rgba(0,0,0,.2), 0 1px 2px 0 rgba(0,0,0,.4);
            --elevation-hover: 0 4px 8px 2px rgba(0,0,0,.3), 0 2px 4px 0 rgba(0,0,0,.4);
         }
         [data-theme="light"] {
            --md-sys-color-background: #f4f8fc;
            --md-sys-color-on-background: #001926;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-on-surface: #001926;
            --md-sys-color-surface-container: #e8f1f8;
            --md-sys-color-surface-container-high: #dce8f2;
            --md-sys-color-primary: #006d2c;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #96ff68;
            --md-sys-color-on-primary-container: #002208;
            --md-sys-color-secondary: #355b78;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #bfd5ff;
            --md-sys-color-on-secondary-container: #001d33;
            --md-sys-color-outline: #747775;
            --md-sys-color-outline-variant: #c4c7c5;
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --chart-increase: #008000;
            --chart-decrease: #ba1a1a;
            --elevation-shadow: 0 1px 3px 1px rgba(0,0,0,.05), 0 1px 2px 0 rgba(0,0,0,.1);
            --elevation-hover: 0 4px 8px 2px rgba(0,0,0,.1), 0 2px 4px 0 rgba(0,0,0,.1);
         }
         * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-family); }
         ::-webkit-scrollbar { width: 8px; height: 8px; }
         ::-webkit-scrollbar-track { background: transparent; }
         ::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: var(--radius-pill); border: 2px solid var(--md-sys-color-background); }
         ::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-outline); }
         body { margin: 0; padding: 0; background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-background); transition: background-color var(--motion-duration) var(--motion-easing), color var(--motion-duration) var(--motion-easing); min-height: 100vh; font-size: 13px; line-height: 1.4; }
         .app-container { max-width: 900px; margin: 0 auto; padding: 12px; padding-top: 56px; }
         h1 { font-size: 20px; font-weight: 700; text-align: center; margin: 0 0 24px 0; letter-spacing: 0.2px; color: var(--md-sys-color-on-background); }
         h2 { font-size: 16px; margin: 12px 0; font-weight: 600; color: var(--md-sys-color-on-surface); }
         h3 { font-size: 14px; margin: 8px 0; font-weight: 500; color: var(--md-sys-color-secondary); }
         a { text-decoration: none; color: inherit; }
         .top-bar-actions { position: fixed; top: 12px; right: 12px; left: 12px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
         .top-bar-actions > * { pointer-events: auto; }
         .icon-btn { width: 40px; height: 40px; border-radius: var(--radius-pill); border: none; background-color: var(--md-sys-color-surface-container); color: var(--md-sys-color-on-surface); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--elevation-shadow); transition: all 0.2s var(--motion-easing); }
         .icon-btn:hover { background-color: var(--md-sys-color-surface-container-high); box-shadow: var(--elevation-hover); }
         .material-symbols-rounded { font-size: 20px; }
         .settings-menu { display: none; position: absolute; top: 48px; right: 0; background: var(--md-sys-color-surface-container-high); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-medium); padding: 16px; box-shadow: var(--elevation-hover); white-space: nowrap; z-index: 100; }
         .settings-menu.active { display: block; animation: fadeUp 0.2s ease; }
         .setting-item { display: flex; align-items: center; gap: 14px; font-size: 13px; cursor: pointer; color: var(--md-sys-color-on-surface); font-weight: 500; }
         .md3-switch { position: relative; width: 50px; height: 30px; background-color: var(--md-sys-color-surface-container-high); border: 2px solid var(--md-sys-color-outline); border-radius: 15px; display: inline-flex; align-items: center; transition: all 0.25s cubic-bezier(0.2,0,0,1); box-sizing: border-box; }
         .md3-switch::after { content: ""; position: absolute; left: 4px; width: 14px; height: 14px; background-color: var(--md-sys-color-outline); border-radius: 50%; transition: all 0.25s cubic-bezier(0.2,0,0,1); }
         .setting-item input[type="checkbox"] { display: none; }
         .setting-item input[type="checkbox"]:checked + .md3-switch { background-color: var(--md-sys-color-primary); border-color: var(--md-sys-color-primary); }
         .setting-item input[type="checkbox"]:checked + .md3-switch::after { left: 24px; width: 22px; height: 22px; background-color: var(--md-sys-color-on-primary); }
         #backButton { height: 40px; padding: 0 16px 0 12px; border-radius: var(--radius-pill); border: none; background-color: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: var(--elevation-shadow); transition: all 0.2s; }
         #backButton:hover { box-shadow: var(--elevation-hover); filter: brightness(1.1); }
         #backButton span.material-symbols-rounded { font-size: 18px; }
         .form-container { max-width: 360px; margin: 0 auto 24px; padding: 20px; background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-extra-large); border: 1px solid var(--md-sys-color-outline-variant); box-shadow: var(--elevation-shadow); }
         .form-group { position: relative; margin-bottom: 16px; }
         .form-group:last-child { margin-bottom: 0; }
         .form-group label { display: block; font-size: 11px; color: var(--md-sys-color-secondary); margin-bottom: 6px; font-weight: 600; padding-left: 4px; }
         .form-group input { width: 100%; height: 40px; padding: 0 12px; background-color: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-small); font-size: 13px; outline: none; appearance: none; -webkit-appearance: none; transition: all 0.2s; }
         .form-group input:focus { border-color: var(--md-sys-color-primary); box-shadow: inset 0 0 0 1px var(--md-sys-color-primary); background-color: var(--md-sys-color-surface); }
         .custom-select-wrapper { position: relative; user-select: none; width: 100%; }
         .custom-select-display { background-color: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-small); padding: 0 16px; height: 40px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; cursor: pointer; transition: border-color 0.2s, background-color 0.2s; }
         .custom-select-display:hover { border-color: var(--md-sys-color-outline); }
         .custom-select-display.active { border-color: var(--md-sys-color-primary); box-shadow: inset 0 0 0 1px var(--md-sys-color-primary); background-color: var(--md-sys-color-surface); }
         .custom-select-options { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--md-sys-color-surface-container-high); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-small); box-shadow: var(--elevation-hover); z-index: 200; overflow: hidden; display: none; }
         .custom-select-options.active { display: block; animation: fadeUp 0.15s ease-out; }
         .custom-option { padding: 12px 16px; font-size: 13px; cursor: pointer; color: var(--md-sys-color-on-surface); transition: background 0.15s; }
         .custom-option:hover { background: var(--md-sys-color-surface-container); }
         .custom-option.disabled { color: var(--md-sys-color-outline); pointer-events: none; }
         #fetchButton { width: 100%; height: 42px; border-radius: var(--radius-pill); border: none; background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); font-size: 13px; font-weight: 700; letter-spacing: 0.3px; cursor: pointer; transition: all 0.2s; box-shadow: var(--elevation-shadow); }
         #fetchButton:hover:not(:disabled) { box-shadow: var(--elevation-hover), 0 0 16px rgba(118,255,51,.4); }
         [data-theme="light"] #fetchButton:hover:not(:disabled) { box-shadow: var(--elevation-hover), 0 0 16px rgba(0,109,44,.4); }
         #fetchButton:disabled { opacity: 0.5; cursor: not-allowed; background-color: var(--md-sys-color-outline); box-shadow: none; }
         .error-message { color: var(--md-sys-color-error); text-align: center; margin-top: 12px; font-size: 11px; min-height: 16px; font-weight: 600; }
         .search-history { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--md-sys-color-surface-container-high); border: 1px solid var(--md-sys-color-outline-variant); border-radius: var(--radius-small); box-shadow: var(--elevation-hover); z-index: 10; max-height: 220px; overflow-y: auto; }
         .search-history.active { display: block; animation: fadeUp 0.2s ease; }
         .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--md-sys-color-outline-variant); transition: background 0.2s; }
         .history-item:last-child { border-bottom: none; }
         .history-item:hover { background: var(--md-sys-color-surface-container); }
         .history-item-text { flex-grow: 1; font-size: 13px; font-weight: 600; color: var(--md-sys-color-on-surface); }
         .history-item-server { font-size: 10px; color: var(--md-sys-color-on-secondary-container); background: var(--md-sys-color-secondary-container); padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-weight: 700; }
         .history-delete { background: none; border: none; color: var(--md-sys-color-outline); cursor: pointer; padding: 4px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
         .history-delete:hover { color: var(--md-sys-color-error); }
         .monitor-container { text-align: center; margin-bottom: 16px; }
         #monitorButton { height: 44px; padding: 0 28px; border-radius: var(--radius-pill); border: none; background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: var(--elevation-shadow); transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; z-index: 999; }
         #monitorButton:hover:not(:disabled) { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); box-shadow: var(--elevation-hover), 0 0 16px rgba(118,255,51,.3); }
         #monitorButton.monitoring { background-color: var(--md-sys-color-error); color: var(--md-sys-color-on-error); }
         #monitorButton.monitoring:hover { box-shadow: var(--elevation-hover), 0 0 16px rgba(255,102,102,.3); }
         .change-indicator.change-increase { color: #76ff33; }
         .change-indicator.change-decrease { color: rgb(255,78,78); }
         .tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 16px; padding: 4px; background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-pill); width: fit-content; margin-left: auto; margin-right: auto; border: 1px solid var(--md-sys-color-outline-variant); }
         .tab-button { padding: 8px 20px; background: transparent; border: none; border-radius: var(--radius-pill); color: var(--md-sys-color-on-surface); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
         .tab-button.active { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); box-shadow: 0 4px 12px rgba(118,255,51,.3); }
         [data-theme="light"] .tab-button.active { box-shadow: 0 4px 12px rgba(0,109,44,.2); }
         .tab-content { display: none; animation: fadeUp 0.2s; }
         .tab-content.active { display: block; }
         #profileSummary { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
         .summary-item { display: flex; flex-direction: column; padding: 12px 14px; background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-medium); border: 1px solid var(--md-sys-color-outline-variant); flex: 1 0 auto; width: auto; min-width: 100px; transition: box-shadow 0.2s, border-color 0.2s; }
         .summary-item:hover { box-shadow: var(--elevation-hover); border-color: var(--md-sys-color-outline); }
         .summary-item.full-width { flex-basis: 100%; background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); align-items: center; justify-content: center; padding: 20px; border: none; border-radius: var(--radius-large); }
         .summary-item.full-width .summary-label { color: var(--md-sys-color-on-primary-container); font-size: 11px; opacity: 0.85; margin-bottom: 4px; }
         .summary-item.full-width .summary-value { font-size: 24px; color: var(--md-sys-color-on-primary-container); font-weight: 700; letter-spacing: -0.5px; }
         /* Crystal/Exp ratio card */
         .summary-item.highlight-card { flex-basis: 100%; background: linear-gradient(135deg, var(--md-sys-color-primary-container) 0%, var(--md-sys-color-secondary-container) 100%); border: 1px solid var(--md-sys-color-primary); border-radius: var(--radius-large); padding: 16px 20px; display: flex; flex-direction: row; gap: 24px; flex-wrap: wrap; }
         .summary-item.highlight-card .highlight-stat { display: flex; flex-direction: column; }
         .summary-item.highlight-card .summary-label { color: var(--md-sys-color-on-primary-container); font-size: 10px; opacity: 0.85; margin-bottom: 4px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
         .summary-item.highlight-card .summary-value { font-size: 28px; font-weight: 700; color: var(--md-sys-color-on-primary-container); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
         .summary-label { font-size: 10px; color: var(--md-sys-color-secondary); margin-bottom: 4px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
         .summary-value { font-size: 13px; font-weight: 600; color: var(--md-sys-color-on-surface); line-height: 1.2; white-space: nowrap; }
         .summary-value.premium { color: var(--md-sys-color-primary); text-shadow: 0 0 12px rgba(118,255,51,.4); }
         .list-section { margin-bottom: 24px; }
         .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
         .list-title { font-size: 14px; margin-bottom: 0; font-weight: 700; border-left: 4px solid var(--md-sys-color-primary); padding-left: 10px; color: var(--md-sys-color-on-background); border-radius: 2px; }
         .list-container { display: flex; padding: 4px 4px 12px 4px; gap: 12px; scroll-snap-type: x mandatory; overflow-x: auto; }
         .data-card { flex: 0 0 160px; scroll-snap-align: start; background-color: var(--md-sys-color-surface-container); padding: 14px 12px; border-radius: var(--radius-large); display: flex; flex-direction: column; text-align: center; border: 1px solid var(--md-sys-color-outline-variant); transition: box-shadow 0.2s, border-color 0.2s; }
         .data-card:hover { box-shadow: var(--elevation-hover); border-color: var(--md-sys-color-primary); }
         .data-card.changed { border: 2px solid var(--md-sys-color-primary); background-color: rgba(118,255,51,.05); }
         .item-name { font-size: 12px; font-weight: 700; margin-bottom: 8px; height: 28px; display: flex; align-items: center; justify-content: center; line-height: 1.2; }
         .item-image { width: 56px; height: 56px; object-fit: contain; margin: 0 auto 10px; filter: drop-shadow(0 4px 4px rgba(0,0,0,.2)); }
         .data-card div { font-size: 11px; margin: 2px 0; color: var(--md-sys-color-on-surface-variant); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
         .data-card strong { color: var(--md-sys-color-on-surface); font-weight: 600; }
         .grade-badge { display: inline-block !important; width: fit-content !important; margin: 4px auto 0 !important; background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); padding: 2px 8px; border-radius: 4px; font-size: 10px !important; font-weight: 700; }
         .view-data-button { margin-top: auto; padding: 6px 12px; background-color: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); border: none; border-radius: var(--radius-small); font-size: 11px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; transition: background-color 0.2s; }
         .view-data-button:hover { background-color: var(--md-sys-color-secondary); color: #fff; }
         .fullscreen-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--md-sys-color-background); z-index: 2000; display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0.2,0,0,1); }
         .fs-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background-color: var(--md-sys-color-surface-container); border-bottom: 1px solid var(--md-sys-color-outline-variant); position: sticky; top: 0; z-index: 10; box-shadow: var(--elevation-shadow); }
         .fs-search-wrapper { position: relative; flex-grow: 1; display: flex; align-items: center; }
         .fs-search-wrapper input { width: 100%; height: 40px; border-radius: var(--radius-pill); border: 1px solid var(--md-sys-color-outline-variant); background-color: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); padding: 0 16px 0 44px; font-size: 14px; }
         .fs-search-wrapper input:focus { border-color: var(--md-sys-color-primary); box-shadow: inset 0 0 0 1px var(--md-sys-color-primary); outline: none; }
         .fs-search-wrapper .material-symbols-rounded { position: absolute; left: 14px; color: var(--md-sys-color-on-surface-variant); font-size: 20px; pointer-events: none; }
         .fullscreen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; padding: 12px; max-width: 1200px; margin: 0 auto; width: 100%; }
         .fullscreen-grid .data-card { flex: unset; scroll-snap-align: unset; width: 100%; }
         .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,.6); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 3000; animation: fadeIn 0.2s; }
         .modal-content { background-color: var(--md-sys-color-surface-container); color: var(--md-sys-color-on-surface); padding: 24px; border-radius: var(--radius-extra-large); width: 90%; max-width: 380px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 24px rgba(0,0,0,.4); border: 1px solid var(--md-sys-color-outline-variant); }
         .close-button { display: block; margin: 20px auto 0; padding: 10px 28px; background-color: var(--md-sys-color-error); color: var(--md-sys-color-on-error); border: none; border-radius: var(--radius-pill); cursor: pointer; font-size: 12px; font-weight: 700; transition: box-shadow 0.2s; }
         .close-button:hover { box-shadow: var(--elevation-hover); filter: brightness(1.1); }
         .md-ripple-anim { position: absolute; border-radius: 50%; transform: scale(0); animation: mdRipple 0.5s linear; background-color: currentColor; opacity: 0.3; pointer-events: none; }
         @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
         @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
         @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
         @keyframes mdRipple { to { transform: scale(4); opacity: 0; } }
         @keyframes spin { to { transform: rotate(360deg); } }
         #changeLogContainer, #rankingsTableContainer, .leaderboard-category { background-color: var(--md-sys-color-surface-container); border-radius: var(--radius-extra-large); padding: 16px; border: 1px solid var(--md-sys-color-outline-variant); box-shadow: var(--elevation-shadow); margin-bottom: 24px; overflow: hidden; }
         table { width: 100%; border-collapse: collapse; font-size: 12px; }
         th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
         th { color: var(--md-sys-color-secondary); font-weight: 600; font-size: 11px; }
         .loader { display: none; justify-content: center; padding: 32px; }
         .loader-inner { width: 32px; height: 32px; border-radius: 50%; border: 4px solid var(--md-sys-color-surface-container-high); border-top-color: var(--md-sys-color-primary); animation: spin 0.8s linear infinite; }
         .no-data-message { text-align: center; color: var(--md-sys-color-outline); padding: 20px; font-size: 12px; font-style: italic; }
         .trash-btn { background-color: transparent !important; box-shadow: none !important; color: var(--md-sys-color-outline) !important; }
         .trash-btn:hover { background-color: rgba(255,102,102,.12) !important; color: var(--md-sys-color-error) !important; }
         [data-theme="light"] .trash-btn:hover { background-color: rgba(186,26,26,.12) !important; }
         .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
         .dialog-btn { padding: 10px 20px; border-radius: var(--radius-pill); border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
         .dialog-cancel { background-color: transparent; color: var(--md-sys-color-primary); }
         .dialog-cancel:hover { background-color: var(--md-sys-color-surface-container-high); }
         .dialog-confirm { background-color: var(--md-sys-color-error); color: var(--md-sys-color-on-error); box-shadow: var(--elevation-shadow); }
         .dialog-confirm:hover { box-shadow: var(--elevation-hover); filter: brightness(1.1); }
      </style>
   </head>
   <body>
      <div class="app-container">
         <div class="top-bar-actions">
            <div id="backToLeaderboardContainer" style="display: none">
               <button id="backButton">
                  <span class="material-symbols-rounded">arrow_back</span>
                  <span>Back</span>
               </button>
            </div>
            <div style="flex-grow: 1"></div>
            <div style="position: relative; display: flex; gap: 8px">
               <div style="position: relative">
                  <button id="settingsToggle" class="icon-btn" aria-label="Settings" title="Settings">
                     <span class="material-symbols-rounded">settings</span>
                  </button>
                  <div id="settingsMenu" class="settings-menu">
                     <label class="setting-item">
                        <span>Precise Time</span>
                        <input type="checkbox" id="preciseTimeToggle" />
                        <span class="md3-switch"></span>
                     </label>
                  </div>
               </div>
               <button id="themeToggle" class="icon-btn" aria-label="Toggle Theme" title="Toggle Dark/Light Theme">
                  <span class="material-symbols-rounded">dark_mode</span>
               </button>
            </div>
         </div>
         <h1>
            <span>Tanki Ratings</span>
            <div style="font-size: 12px; font-weight: 500; color: var(--md-sys-color-secondary); margin-top: 6px;">Redesigned</div>
         </h1>
         <div class="form-container">
            <div class="form-group">
               <label for="server">Server</label>
               <div class="custom-select-wrapper" id="customServerWrapper">
                  <div class="custom-select-display" id="customServerDisplay">
                     EU Server
                     <span class="material-symbols-rounded" style="font-size: 18px">arrow_drop_down</span>
                  </div>
                  <div class="custom-select-options" id="customServerOptions">
                     <div class="custom-option" data-value="eu" id="opt_eu_custom">EU Server</div>
                  </div>
               </div>
               <select id="server" style="display: none">
                  <option value="eu" selected>eu</option>
               </select>
            </div>
            <div class="form-group">
               <label for="username">Nickname</label>
               <input type="text" id="username" placeholder="e.g. Godmode_ON" autocomplete="off" />
               <div id="searchHistory" class="search-history"></div>
            </div>
            <div class="form-group" style="margin-top: 20px">
               <button id="fetchButton">Fetch Data</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
         </div>
         <div class="loader" id="loader">
            <div class="loader-inner"></div>
         </div>
         <div id="leaderboardContainer"></div>
         <div id="resultsWrapper" class="results-wrapper" style="display: none">
            <div class="monitor-container">
               <button id="monitorButton">
                  <span class="material-symbols-rounded">play_arrow</span>
                  <span id="txt_monitor_label">Start Monitoring</span>
               </button>
            </div>
            <div class="tabs">
               <button class="tab-button active" data-tab="profile">Profile</button>
               <button class="tab-button" data-tab="log">Change Log</button>
            </div>
            <div id="profileContent" class="tab-content active">
               <div id="profileSummary"></div>
               <div id="rankingsTableContainer"></div>
               <div id="listsContainer"></div>
            </div>
            <div id="logContent" class="tab-content">
               <div id="changeLogContainer">
                  <p class="no-data-message">No data changes recorded yet.</p>
               </div>
            </div>
         </div>
      </div>
      <script>
         // --- Ripple ---
         document.addEventListener("mousedown", function (e) {
            const btn = e.target.closest("button, .tab-button, .history-item, .custom-select-display, .custom-option, .setting-item");
            if (!btn) return;
            if (window.getComputedStyle(btn).position === "static") btn.style.position = "relative";
            btn.style.overflow = "hidden";
            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement("span");
            const diameter = Math.max(rect.width, rect.height);
            const radius = diameter / 2;
            ripple.style.width = ripple.style.height = `${diameter}px`;
            ripple.style.left = `${e.clientX - rect.left - radius}px`;
            ripple.style.top = `${e.clientY - rect.top - radius}px`;
            ripple.className = "md-ripple-anim";
            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
         });

         // --- Theme ---
         const themeToggleBtn = document.getElementById("themeToggle");
         function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
            themeToggleBtn.querySelector("span").textContent = theme === "dark" ? "dark_mode" : "light_mode";
         }
         setTheme(localStorage.getItem("theme") || "dark");
         themeToggleBtn.addEventListener("click", () =>
            setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark")
         );

         // --- Settings ---
         let isPreciseTime = localStorage.getItem("precise_time") === "true";
         const settingsBtn = document.getElementById("settingsToggle");
         const settingsMenu = document.getElementById("settingsMenu");
         const preciseToggle = document.getElementById("preciseTimeToggle");
         preciseToggle.checked = isPreciseTime;
         settingsBtn.addEventListener("click", (e) => { e.stopPropagation(); settingsMenu.classList.toggle("active"); });
         document.addEventListener("click", (e) => {
            if (!e.target.closest("#settingsMenu") && !e.target.closest("#settingsToggle")) settingsMenu.classList.remove("active");
         });
         preciseToggle.addEventListener("change", (e) => {
            isPreciseTime = e.target.checked;
            localStorage.setItem("precise_time", isPreciseTime);
            if (lastProfileData) updateDisplay(lastProfileData, null);
         });

         function formatTime(ms) {
            if (ms == null || ms <= 0) return "-";
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const msPart = ms % 1000;
            const parts = [];
            if (isPreciseTime) {
               if (h > 0) parts.push(`${h} h`);
               if (m > 0 || h > 0) parts.push(`${m} m`);
               parts.push(`${(s + msPart / 1000).toFixed(3)} s`);
            } else {
               if (h > 0) parts.push(`${h} h`);
               if (m > 0 || h > 0) parts.push(`${m} m`);
               if (h === 0 && m === 0) return "< 1 m";
            }
            return parts.join(" ");
         }

         // --- Custom select ---
         const customServerDisplay = document.getElementById("customServerDisplay");
         const customServerOptions = document.getElementById("customServerOptions");
         const realSelect = document.getElementById("server");
         customServerDisplay.addEventListener("click", (e) => {
            e.stopPropagation();
            customServerOptions.classList.toggle("active");
            customServerDisplay.classList.toggle("active");
         });
         customServerOptions.querySelectorAll(".custom-option").forEach((opt) => {
            opt.addEventListener("click", () => {
               if (opt.classList.contains("disabled")) return;
               realSelect.value = opt.dataset.value;
               customServerDisplay.innerHTML = `${opt.textContent} <span class="material-symbols-rounded" style="font-size:18px">arrow_drop_down</span>`;
               customServerOptions.classList.remove("active");
               customServerDisplay.classList.remove("active");
            });
         });
         document.addEventListener("click", () => {
            customServerOptions.classList.remove("active");
            customServerDisplay.classList.remove("active");
         });

         // --- Search history ---
         let searchHistory = JSON.parse(localStorage.getItem("search_history") || "[]");
         function updateHistory(server, username) {
            searchHistory = searchHistory.filter(h => !(h.server === server && h.username === username));
            searchHistory.unshift({ server, username });
            if (searchHistory.length > 15) searchHistory.pop();
            localStorage.setItem("search_history", JSON.stringify(searchHistory));
            renderHistory();
         }
         function removeHistory(server, username, e) {
            e.stopPropagation();
            searchHistory = searchHistory.filter(h => !(h.server === server && h.username === username));
            localStorage.setItem("search_history", JSON.stringify(searchHistory));
            renderHistory();
         }
         function renderHistory() {
            const container = document.getElementById("searchHistory");
            if (searchHistory.length === 0) { container.classList.remove("active"); return; }
            container.innerHTML = searchHistory.map(h => `
               <div class="history-item" onclick="triggerHistorySearch('${h.server}', '${h.username}')">
                  <span class="history-item-text">${h.username}</span>
                  <span class="history-item-server">EU</span>
                  <button class="history-delete" onclick="removeHistory('${h.server}', '${h.username}', event)">
                     <span class="material-symbols-rounded">close</span>
                  </button>
               </div>`).join("");
         }
         window.triggerHistorySearch = function (server, username) {
            realSelect.value = server;
            customServerDisplay.innerHTML = `EU Server <span class="material-symbols-rounded" style="font-size:18px">arrow_drop_down</span>`;
            document.getElementById("username").value = username;
            document.getElementById("searchHistory").classList.remove("active");
            handleFetch();
         };
         document.getElementById("username").addEventListener("focus", () => {
            if (searchHistory.length > 0) document.getElementById("searchHistory").classList.add("active");
         });
         document.addEventListener("click", (e) => {
            if (!e.target.closest(".form-group")) document.getElementById("searchHistory").classList.remove("active");
         });

         renderHistory();

         const API_CONFIG = {
            baseUrls: { eu: "https://ratings.tankionline.com/api/eu/profile/" },
            leaderboardUrl: "https://ratings.tankionline.com/api/eu/top/",
            monitorInterval: 3000,
         };

         const RANKS = ["Recruit","Private","Gefreiter","Corporal","Master Corporal","Sergeant","Staff Sergeant","Master Sergeant","First Sergeant","Sergeant-Major","Warrant Officer 1","Warrant Officer 2","Warrant Officer 3","Warrant Officer 4","Warrant Officer 5","Third Lieutenant","Second Lieutenant","First Lieutenant","Captain","Major","Lieutenant Colonel","Colonel","Brigadier","Major General","Lieutenant General","General","Marshal","Field Marshal","Commander","Generalissimo","Legend"];

         const LIST_DATA_CONFIGS = [
            { key: "turretsPlayed", title: "Turrets Played" },
            { key: "hullsPlayed", title: "Hulls Played" },
            { key: "dronesPlayed", title: "Drones Played" },
            { key: "resistanceModules", title: "Modules" },
            { key: "paintsPlayed", title: "Paints" },
            { key: "modesPlayed", title: "Modes Played" },
            { key: "suppliesUsage", title: "Supplies Usage" },
            { key: "presents", title: "Gifts Received" },
         ];

         const LEADERBOARD_CATEGORIES = [
            { key: "score", title: "Experience" },
            { key: "crystals", title: "Crystals Earned" },
            { key: "golds", title: "Gold Boxes Caught" },
            { key: "efficiency", title: "Efficiency" },
            { key: "stars_current", title: "Stars (Current)" },
            { key: "stars_previous", title: "Stars (Previous)" },
         ];

         const elements = {
            fetchButton: document.getElementById("fetchButton"),
            monitorButton: document.getElementById("monitorButton"),
            usernameInput: document.getElementById("username"),
            loader: document.getElementById("loader"),
            errorMessage: document.getElementById("errorMessage"),
            leaderboardContainer: document.getElementById("leaderboardContainer"),
            resultsWrapper: document.getElementById("resultsWrapper"),
            profileSummary: document.getElementById("profileSummary"),
            rankingsTableContainer: document.getElementById("rankingsTableContainer"),
            listsContainer: document.getElementById("listsContainer"),
            tabs: document.querySelectorAll(".tab-button"),
            tabContents: document.querySelectorAll(".tab-content"),
            changeLogContainer: document.getElementById("changeLogContainer"),
            backButton: document.getElementById("backButton"),
            backToLeaderboardContainer: document.getElementById("backToLeaderboardContainer"),
         };

         let isMonitoring = false, monitoringTimeoutId = null, lastProfileData = null,
             changeLog = [], currentUsername = "", currentServer = "",
             leaderboardData = null, currentLeaderboardIndex = 0;

         document.addEventListener("DOMContentLoaded", () => {
            if (!new URLSearchParams(window.location.search).has("username")) fetchAndRenderLeaderboard();
            processUrlParams();
         });
         window.addEventListener("popstate", () => { if (isMonitoring) stopMonitoring(); processUrlParams(); });

         elements.fetchButton.addEventListener("click", () => { updateBrowserUrl(realSelect.value, elements.usernameInput.value.trim()); handleFetch(); });
         elements.monitorButton.addEventListener("click", toggleMonitoring);
         elements.usernameInput.addEventListener("keypress", (e) => { if (e.key === "Enter") { updateBrowserUrl(realSelect.value, elements.usernameInput.value.trim()); handleFetch(); } });
         elements.backButton.addEventListener("click", () => showLeaderboardView(true));
         elements.tabs.forEach(tab => tab.addEventListener("click", () => {
            elements.tabs.forEach(t => t.classList.remove("active"));
            elements.tabContents.forEach(c => c.classList.remove("active"));
            tab.classList.add("active");
            document.querySelector(`#${tab.dataset.tab}Content`).classList.add("active");
         }));

         function processUrlParams() {
            const params = new URLSearchParams(window.location.search);
            const server = params.get("server"), username = params.get("username");
            if (server && realSelect.querySelector(`option[value="${server}"]`)) {
               realSelect.value = server;
               customServerDisplay.innerHTML = `EU Server <span class="material-symbols-rounded" style="font-size:18px">arrow_drop_down</span>`;
            }
            if (username) { elements.usernameInput.value = username; handleFetch(); }
            else showLeaderboardView(false);
         }
         function updateBrowserUrl(server, username) {
            if (!username) return;
            const newUrl = `${window.location.pathname}?server=${encodeURIComponent(server)}&username=${encodeURIComponent(username)}`;
            const pageTitle = `Tanki Ratings - ${username}`;
            document.title = pageTitle;
            if (window.location.href !== newUrl) history.pushState({ server, username }, pageTitle, newUrl);
         }

         function translateText(text) {
            if (typeof text !== "string" || !text) return text;
            return text.toLowerCase().split(/[_\-\s]+/).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
         }

         function showLeaderboardView(pushState = true) {
            elements.resultsWrapper.style.display = "none";
            if (isMonitoring) stopMonitoring();
            elements.usernameInput.value = "";
            displayError("");
            elements.leaderboardContainer.style.display = "block";
            elements.backToLeaderboardContainer.style.display = "none";
            if (!leaderboardData) fetchAndRenderLeaderboard();
            if (pushState) { document.title = "Tanki Ratings"; history.pushState({}, "Tanki Ratings", window.location.pathname); }
         }

         async function fetchStarsLeaderboardData() {
            const apiUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent("https://pages.tankionline.com/challenge-accepted")}`;
            try {
               const response = await fetch(apiUrl);
               if (!response.ok) throw new Error("Status " + response.status);
               const htmlText = await response.text();
               const doc = new DOMParser().parseFromString(htmlText, "text/html");
               const parseList = (selector, prizeParser) => {
                  const list = doc.querySelector(selector);
                  if (!list) return [];
                  const players = [];
                  list.querySelectorAll("ul.list-content li").forEach(li => {
                     const name = li.querySelector(".name")?.textContent.trim();
                     const value = parseInt(li.querySelector(".stars")?.textContent.trim().replace(/\s/g, ""), 10);
                     if (name && !isNaN(value)) {
                        const player = { uid: name, value };
                        if (prizeParser) player.prizes = prizeParser(li);
                        players.push(player);
                     }
                  });
                  return players;
               };
               const prizeParser = li => Array.from(li.querySelector(".prizes")?.querySelectorAll(".prize") || []).map(p => Array.from(p.classList).find(c => c !== "prize")).filter(Boolean);
               return { stars_current: parseList(".rating-list.active"), stars_previous: parseList(".rating-list.old-list", prizeParser) };
            } catch (e) { return { stars_current: [], stars_previous: [] }; }
         }

         async function fetchAndRenderLeaderboard() {
            const container = elements.leaderboardContainer;
            container.style.display = "block";
            container.innerHTML = `<div class="loader" style="display: flex;"><div class="loader-inner"></div></div>`;
            try {
               const [regularDataResponse, starsData] = await Promise.all([
                  fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(API_CONFIG.leaderboardUrl)}`).then(res => { if (!res.ok) throw new Error(res.status); return res.json(); }),
                  fetchStarsLeaderboardData(),
               ]);
               if (regularDataResponse?.response) {
                  leaderboardData = { ...regularDataResponse.response, ...starsData };
                  currentLeaderboardIndex = 0;
                  renderLeaderboardCarousel();
               } else throw new Error("Format Error");
            } catch (error) {
               container.innerHTML = `<p class="no-data-message" style="color: var(--md-sys-color-error);">Error: ${error.message}</p>`;
            }
         }

         function renderLeaderboardCarousel() {
            elements.leaderboardContainer.innerHTML = `<h2>Weekly / Event Leaderboards</h2><div class="leaderboard-carousel-container"><div id="leaderboardCarouselContent"></div><button id="leaderboardPrev" class="carousel-nav-button"><span class="material-symbols-rounded">chevron_left</span></button><button id="leaderboardNext" class="carousel-nav-button"><span class="material-symbols-rounded">chevron_right</span></button></div>`;
            document.getElementById("leaderboardPrev").addEventListener("click", showPrevLeaderboard);
            document.getElementById("leaderboardNext").addEventListener("click", showNextLeaderboard);
            renderCurrentLeaderboard();
         }

         function renderCurrentLeaderboard() {
            if (!leaderboardData) return;
            const contentDiv = document.getElementById("leaderboardCarouselContent");
            if (!contentDiv) return;
            contentDiv.style.opacity = 0;
            setTimeout(() => {
               const itemsPerPage = window.innerWidth < 768 ? 1 : 2;
               let combinedHtml = "";
               for (let i = 0; i < itemsPerPage; i++) {
                  const category = LEADERBOARD_CATEGORIES[(currentLeaderboardIndex + i) % LEADERBOARD_CATEGORIES.length];
                  const categoryData = leaderboardData[category.key];
                  let html = `<div class="leaderboard-category"><h3 class="list-title" style="border:none; padding:0; text-align: center;">${category.title}</h3>`;
                  if (categoryData?.length > 0) {
                     html += '<div class="leaderboard-table-wrapper">';
                     if (category.key === "stars_previous") {
                        html += `<table class="leaderboard-table" style="min-width: 100%;"><thead><tr><th style="width:10%;">#</th><th style="width:35%;">Name</th><th style="width:35%;">Reward</th><th style="width:20%;">Stars</th></tr></thead><tbody>${categoryData.map((p, idx) => `<tr><td>${idx + 1}</td><td><a href="#" class="player-link" data-username="${p.uid}">${p.uid}</a></td><td><div class="prize-icons-container">${(p.prizes || []).map(pz => `<div class="prize-icon ${pz.replace(/_/g, "-")}" title="${pz}"></div>`).join("")}</div></td><td>${p.value.toLocaleString()}</td></tr>`).join("")}</tbody></table>`;
                     } else {
                        html += `<table class="leaderboard-table"><thead><tr><th>#</th><th>Name</th><th>Value</th></tr></thead><tbody>${categoryData.map((p, idx) => `<tr><td>${idx + 1}</td><td><a href="#" class="player-link" data-username="${p.uid}">${p.uid}</a></td><td>${category.key === "efficiency" ? (p.value / 1000).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : p.value.toLocaleString()}</td></tr>`).join("")}</tbody></table>`;
                     }
                     html += "</div>";
                  } else html += `<div class="no-data-message">No Data</div>`;
                  html += `</div>`;
                  combinedHtml += html;
               }
               contentDiv.innerHTML = combinedHtml;
               contentDiv.querySelectorAll(".player-link").forEach(link => link.addEventListener("click", (e) => {
                  e.preventDefault();
                  const user = e.target.dataset.username;
                  if (user) { elements.usernameInput.value = user; updateBrowserUrl(realSelect.value, user); handleFetch(); }
               }));
               contentDiv.style.opacity = 1;
            }, 150);
         }

         function showNextLeaderboard() { currentLeaderboardIndex = (currentLeaderboardIndex + (window.innerWidth < 768 ? 1 : 2)) % LEADERBOARD_CATEGORIES.length; renderCurrentLeaderboard(); }
         function showPrevLeaderboard() { currentLeaderboardIndex = (currentLeaderboardIndex - (window.innerWidth < 768 ? 1 : 2) + LEADERBOARD_CATEGORIES.length) % LEADERBOARD_CATEGORIES.length; renderCurrentLeaderboard(); }

         async function handleFetch() {
            if (isMonitoring) { displayError("Please stop monitoring before making a new query"); return; }
            currentServer = realSelect.value;
            currentUsername = elements.usernameInput.value.trim();
            if (!currentUsername) { displayError("Please enter a nickname"); return; }
            updateHistory(currentServer, currentUsername);
            document.getElementById("searchHistory").classList.remove("active");
            clearDisplay(true);
            setLoading(true);
            try {
               const logKey = `${currentServer}_${currentUsername.toLowerCase()}`;
               const allLogs = JSON.parse(localStorage.getItem("tanki_logs") || "{}");
               changeLog = allLogs[logKey] || [];
               renderChangeLog();
               const profileData = await fetchProfileData(currentServer, currentUsername);
               updateDisplay(profileData);
               lastProfileData = profileData;
            } catch (error) { displayError(error.message); }
            finally { setLoading(false); }
         }

         async function fetchProfileData(server, username) {
            const targetUrl = `${API_CONFIG.baseUrls[server]}?user=${encodeURIComponent(username)}&lang=en&_=${Date.now()}`;
            const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`);
            if (!response.ok) throw new Error(response.status);
            const data = await response.json();
            if (data?.responseType === "NOT_FOUND") throw new Error("Player not found. Check the nickname or if the profile is hidden.");
            return data.response;
         }

         function toggleMonitoring() {
            if (isMonitoring) stopMonitoring();
            else {
               if (!lastProfileData) { displayError("Please fetch data at least once before monitoring"); return; }
               isMonitoring = true;
               elements.monitorButton.innerHTML = `<span class="material-symbols-rounded">stop</span><span>Stop Monitoring</span>`;
               elements.monitorButton.classList.add("monitoring");
               elements.fetchButton.disabled = elements.usernameInput.disabled = true;
               document.getElementById("customServerDisplay").classList.add("disabled");
               displayError("Monitoring active...");
               performMonitoringFetch();
            }
         }
         function stopMonitoring() {
            isMonitoring = false;
            clearTimeout(monitoringTimeoutId);
            elements.monitorButton.innerHTML = `<span class="material-symbols-rounded">play_arrow</span><span>Start Monitoring</span>`;
            elements.monitorButton.classList.remove("monitoring");
            elements.fetchButton.disabled = elements.usernameInput.disabled = false;
            document.getElementById("customServerDisplay").classList.remove("disabled");
            displayError("");
         }
         async function performMonitoringFetch() {
            if (!isMonitoring) return;
            try {
               const newData = await fetchProfileData(currentServer, currentUsername);
               if (isMonitoring) displayError("Monitoring... Data Refreshed");
               updateDisplay(newData, lastProfileData);
               lastProfileData = newData;
            } catch (e) {
               if (isMonitoring) displayError(`Monitoring stopped: ${e.message} (${API_CONFIG.monitorInterval / 1000}s retry)`);
            } finally {
               if (isMonitoring) monitoringTimeoutId = setTimeout(performMonitoringFetch, API_CONFIG.monitorInterval);
            }
         }

         function updateDisplay(newData, oldData = null) {
            if (!oldData) {
               elements.leaderboardContainer.style.display = "none";
               elements.resultsWrapper.style.display = "block";
               elements.backToLeaderboardContainer.style.display = "block";
            }
            displayProfileSummary(newData, oldData);
            displayRankingsTable(newData, oldData);
            displayAllLists(newData, oldData);
         }

         function createChangeSpan(diff) {
            return diff === 0 || isNaN(diff) ? "" : `<span class="change-indicator ${diff > 0 ? "change-increase" : "change-decrease"}">${diff > 0 ? "+" : ""}${diff.toLocaleString(undefined, { maximumFractionDigits: 3 })}</span>`;
         }

         function logChange(item, oldV, newV) {
            const timeOptions = { hour12: true, month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit" };
            changeLog.unshift({
               timestamp: new Date().toLocaleString("en-US", timeOptions),
               item: translateText(item),
               oldValue: oldV?.toLocaleString(undefined, { maximumFractionDigits: 3 }) || "N/A",
               newValue: newV?.toLocaleString(undefined, { maximumFractionDigits: 3 }) || "N/A",
            });
            if (changeLog.length > 100) changeLog.pop();
            const logKey = `${currentServer}_${currentUsername.toLowerCase()}`;
            const allLogs = JSON.parse(localStorage.getItem("tanki_logs") || "{}");
            allLogs[logKey] = changeLog;
            localStorage.setItem("tanki_logs", JSON.stringify(allLogs));
            renderChangeLog();
         }

         function renderChangeLog() {
            if (changeLog.length === 0) { elements.changeLogContainer.innerHTML = `<p class="no-data-message">No data changes recorded yet.</p>`; return; }
            const headerHtml = `
               <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--md-sys-color-outline-variant);">
                  <div style="font-size: 14px; font-weight: 700; color: var(--md-sys-color-on-background);">
                     <span class="material-symbols-rounded" style="font-size:18px; vertical-align:middle; margin-right:4px;">history</span>
                     Change Log (${changeLog.length})
                  </div>
                  <button id="clearLogBtn" class="icon-btn trash-btn" title="Clear Logs">
                     <span class="material-symbols-rounded" style="font-size: 20px;">delete</span>
                  </button>
               </div>`;
            const listHtml = changeLog.map(log => `
               <div class="log-entry" style="display:flex; gap:12px; margin-bottom:12px; align-items: flex-start; padding: 12px; background-color: var(--md-sys-color-surface-container-high); border-radius: var(--radius-small); border: 1px solid var(--md-sys-color-outline-variant);">
                  <div style="color:var(--md-sys-color-primary); margin-top:2px;"><span class="material-symbols-rounded" style="font-size:20px;">update</span></div>
                  <div>
                     <div style="font-size:11px; color:var(--md-sys-color-secondary); margin-bottom: 4px;">${log.timestamp}</div>
                     <div style="font-size:13px; color:var(--md-sys-color-on-surface);">
                        <strong>${log.item}</strong> from <span style="font-weight: 600; color: var(--md-sys-color-outline);">${log.oldValue}</span> <span style="color:var(--md-sys-color-primary); margin: 0 4px;">➔</span> <span style="font-weight: 600;">${log.newValue}</span>
                     </div>
                  </div>
               </div>`).join("");
            elements.changeLogContainer.innerHTML = headerHtml + listHtml;
            document.getElementById("clearLogBtn").addEventListener("click", () => {
               showConfirmDialog("Are you sure you want to clear all logs for this player? This cannot be undone.", () => {
                  changeLog = [];
                  const allLogs = JSON.parse(localStorage.getItem("tanki_logs") || "{}");
                  const logKey = `${currentServer}_${currentUsername.toLowerCase()}`;
                  delete allLogs[logKey];
                  localStorage.setItem("tanki_logs", JSON.stringify(allLogs));
                  renderChangeLog();
               });
            });
         }

         function displayProfileSummary(profile, oldProfile) {
            const getStat = (p, key, old, label) => {
               const v = p?.[key] ?? 0;
               if (!old) return { v: v.toLocaleString(), c: "" };
               const ov = old?.[key] ?? 0;
               if (v !== ov) logChange(label || key, ov, v);
               return { v: v.toLocaleString(), c: createChangeSpan(v - ov) };
            };
            const s = {
               k: getStat(profile, "kills", oldProfile, "Kills"),
               d: getStat(profile, "deaths", oldProfile, "Deaths"),
               sc: getStat(profile, "score", oldProfile, "Experience"),
               g: getStat(profile, "gearScore", oldProfile, "Gear Score"),
               c: getStat(profile, "earnedCrystals", oldProfile, "Crystals"),
               gb: getStat(profile, "caughtGolds", oldProfile, "Gold Boxes"),
            };
            const tt = (profile.hullsPlayed || []).reduce((t, h) => t + (h.timePlayed || 0), 0);
            const ts = (profile.suppliesUsage || []).reduce((t, sp) => t + (sp.usages || 0), 0);
            const rankN = profile.rank || 1;

            // --- Crystal / Experience ratio ---
            const crystals = profile.earnedCrystals ?? 0;
            const exp = profile.score ?? 0;
            const ratio = exp > 0 ? crystals / exp : 0;
            const ratioStr = ratio.toFixed(3);

            const oldCrystals = oldProfile ? (oldProfile.earnedCrystals ?? 0) : null;
            const oldExp = oldProfile ? (oldProfile.score ?? 0) : null;
            const oldRatio = (oldExp !== null && oldExp > 0) ? oldCrystals / oldExp : null;

            // Log ratio change during monitoring (threshold 0.0005 avoids noise)
            if (oldRatio !== null && Math.abs(ratio - oldRatio) >= 0.0005) {
               logChange("Crystal/Experience Ratio", oldRatio, ratio);
            }

            const ratioDiff = oldRatio !== null ? createChangeSpan(ratio - oldRatio) : "";

            const highlightCard = `
               <div class="summary-item highlight-card">
                  <div class="highlight-stat">
                     <span class="summary-label">Crystal / Experience Ratio</span>
                     <span class="summary-value">${ratioStr}${ratioDiff}</span>
                  </div>
               </div>`;

            elements.profileSummary.innerHTML =
               `<div class="summary-item full-width"><span class="summary-label">Nickname</span><span class="summary-value">${profile.name || "N/A"}</span></div>` +
               highlightCard +
               [
                  { l: "Rank", v: rankN > 0 ? (rankN <= RANKS.length ? RANKS[rankN - 1] : `${RANKS[RANKS.length - 1]} ${rankN - RANKS.length}`) : "Unknown Rank" },
                  { l: "Experience", v: `${s.sc.v}${s.sc.c} / ${profile.scoreNext?.toLocaleString() || 0}` },
                  { l: "Premium", v: profile.hasPremium ? "Active" : "Inactive", p: profile.hasPremium },
                  { l: "Gear Score", v: `${s.g.v}${s.g.c}` },
                  { l: "Kills / Deaths", v: `${s.k.v}${s.k.c} / ${s.d.v}${s.d.c}` },
                  { l: "K/D Ratio", v: profile.deaths === 0 ? "∞" : (profile.kills / profile.deaths).toFixed(2) },
                  { l: "Time Played", v: formatTime(tt) },
                  { l: "Supplies Used", v: ts.toLocaleString() },
                  { l: "Crystals", v: `${s.c.v}${s.c.c}` },
                  { l: "Gold Boxes", v: `${s.gb.v}${s.gb.c}` },
               ].map(i => `<div class="summary-item"><span class="summary-label">${i.l}</span><span class="summary-value ${i.p ? "premium" : ""}">${i.v}</span></div>`).join("");
         }

         function displayRankingsTable(newData, oldData) {
            const currentRating = newData.rating || {}, prevRating = newData.previousRating || {}, oldRating = oldData?.rating;
            const rows = [
               { k: "score", n: "Experience" },
               { k: "golds", n: "Gold Boxes" },
               { k: "crystals", n: "Crystals" },
               { k: "efficiency", n: "Efficiency" },
            ].map(c => {
               const cur = currentRating[c.k] || {}, prv = prevRating[c.k] || {}, old = oldRating?.[c.k],
                  cv = c.k === "efficiency" && cur.value > 0 ? cur.value / 1000 : cur.value,
                  ov = c.k === "efficiency" && old?.value > 0 ? old.value / 1000 : old?.value;
               let pHTML = "", vHTML = "";
               if (old) {
                  if (cur.position > 0 && old.position > 0 && cur.position !== old.position) { pHTML = createChangeSpan(old.position - cur.position); logChange(`${c.n} Rank`, old.position, cur.position); }
                  if (cv !== ov) { vHTML = createChangeSpan(cv - ov); logChange(`${c.n} Value`, ov, cv); }
               }
               // Efficiency: always 2 decimal places; others: no decimals
               const fmt = v => {
                  if (v == -1 || v == null) return "-";
                  if (c.k === "efficiency") return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                  return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
               };
               return `<tr><td>${c.n}</td><td>${fmt(cur.position)}${pHTML}</td><td>${fmt(cv)}${vHTML}</td><td>${fmt(prv.position)}</td><td>${fmt(c.k === "efficiency" && prv.value > 0 ? prv.value / 1000 : prv.value)}</td></tr>`;
            }).join("");
            elements.rankingsTableContainer.innerHTML = `<h3 class="list-title" style="text-align:center;margin-bottom:12px;border:none;padding:0;">Weekly Ratings</h3><table cellpadding="0" cellspacing="0"><thead><tr><th>Category</th><th>Rank</th><th>Value</th><th>Prev Rank</th><th>Prev Value</th></tr></thead><tbody>${rows}</tbody></table>`;
         }

         function displayAllLists(newData, oldData) {
            elements.listsContainer.innerHTML = "";
            LIST_DATA_CONFIGS.forEach(config => {
               const newItems = newData[config.key] || [], oldItems = oldData?.[config.key] || [];
               const section = document.createElement("div");
               section.className = "list-section";
               const header = document.createElement("div");
               header.className = "list-header";
               const title = document.createElement("h3");
               title.className = "list-title";
               title.textContent = config.title;
               header.appendChild(title);
               if (newItems.length > 0) {
                  const btn = document.createElement("button");
                  btn.className = "icon-btn expand-btn";
                  btn.innerHTML = '<span class="material-symbols-rounded">fullscreen</span>';
                  btn.onclick = () => openFullscreenList(newItems, oldItems, config.title);
                  header.appendChild(btn);
               }
               section.appendChild(header);
               if (!newItems.length) {
                  const p = document.createElement("p");
                  p.className = "no-data-message";
                  p.textContent = "No Data";
                  section.appendChild(p);
               } else {
                  const container = document.createElement("div");
                  container.className = "list-container";
                  displayListData(newItems, oldItems, container, config.title);
                  section.appendChild(container);
               }
               elements.listsContainer.appendChild(section);
            });
         }

         function displayListData(newItems, oldItems, container, title) {
            const aggNew = aggregateItems(newItems, title),
               oldMap = new Map(aggregateItems(oldItems, title).map(i => [i.name, i]));
            aggNew.forEach(item => {
               item.changes = {}; item.hasChanged = false;
               const oldI = oldMap.get(item.name);
               if (oldI) ["scoreEarned", "timePlayed", "usages", "count"].forEach(p => {
                  if ((item[p] || 0) > (oldI[p] || 0)) {
                     item.changes[p] = item.hasChanged = true;
                     logChange(`${item.name} ` + (p === "scoreEarned" ? "Experience" : p === "timePlayed" ? "Time" : "Count"), oldI[p], item[p]);
                  }
               });
            });
            aggNew.sort((a, b) => b.hasChanged - a.hasChanged || (b.timePlayed || b.usages || 0) - (a.timePlayed || a.usages || 0))
               .forEach(item => {
                  const div = document.createElement("div");
                  div.className = `data-card ${item.hasChanged ? "changed" : ""}`;
                  let img = item.imageUrl ? item.imageUrl.replace(/s\.(eu\.tankionline|3dtank)\.com/g, "s.eu.tankionline.com").replace(/\.tnk/g, ".webp") : null;
                  if (title === "Modules" && img) img = img.replace(/\.webp$/, ".svg");
                  const cf = (l, v, p) => `<div class="${item.changes[p] ? "field-changed" : ""}"><strong>${l}:</strong> ${v}${item.changes[p] ? createChangeSpan((item[p] || 0) - (oldMap.get(item.name)?.[p] || 0)) : ""}</div>`;
                  let h = `<div class="item-name">${translateText(item.name) || "-"}</div>`;
                  if (img) h += `<img src="${img}" class="item-image" loading="lazy" />`;
                  if (item.properties != null) h += cf("Properties", translateText(item.properties?.toLocaleString()), "properties");
                  if (item.grade != null && item.grade != -1) h += `<div class="grade-badge">${getGradeName(item.grade)}</div>`;
                  if (title !== "Supplies Usage" && title !== "Gifts Received") {
                     if (item.timePlayed > 0) {
                        if (item.scoreEarned != null) h += cf("Experience", item.scoreEarned?.toLocaleString(), "scoreEarned");
                        h += cf("Time", formatTime(item.timePlayed), "timePlayed");
                     } else h += `<div style="font-size: 11px; color: var(--md-sys-color-outline); margin-top: 4px; font-style: italic;">Not Played</div>`;
                  }
                  if (item.count != null && title === "Gifts Received") h += cf("Count", item.count?.toLocaleString(), "count");
                  if (item.usages != null && title === "Supplies Usage") h += cf("Count", item.usages?.toLocaleString(), "usages");
                  div.innerHTML = h;
                  if (item.detailedGrades?.length > 1) {
                     const btn = document.createElement("button");
                     btn.className = "view-data-button";
                     btn.textContent = title === "Modes Played" ? "Types" : title === "Paints" ? "Versions" : "Grades";
                     btn.onclick = () => showDetailedGrades(item.name, item.detailedGrades, title);
                     div.appendChild(btn);
                  }
                  container.appendChild(div);
               });
         }

         function openFullscreenList(newItems, oldItems, title) {
            const container = document.createElement("div");
            container.className = "fullscreen-grid";
            displayListData(newItems, oldItems, container, title);
            const html = `
            <div class="fullscreen-modal" id="fsModal">
               <div class="fs-header">
                  <button class="icon-btn close-fs-btn" style="width: 40px; height: 40px; background: transparent; box-shadow: none; flex-shrink: 0;">
                     <span class="material-symbols-rounded">arrow_back</span>
                  </button>
                  <div class="fs-search-wrapper">
                     <span class="material-symbols-rounded">search</span>
                     <input type="text" id="fsSearchInput" placeholder="Search ${title}..." autocomplete="off" />
                  </div>
               </div>
               <div id="fsContainer" style="flex-grow: 1; overflow-y: auto;"></div>
            </div>`;
            document.body.insertAdjacentHTML("beforeend", html);
            const overlay = document.getElementById("fsModal");
            document.getElementById("fsContainer").appendChild(container);
            overlay.querySelector(".close-fs-btn").onclick = () => overlay.remove();
            const searchInput = overlay.querySelector("#fsSearchInput");
            searchInput.addEventListener("input", (e) => {
               const term = e.target.value.toLowerCase().trim();
               container.querySelectorAll(".data-card").forEach(card => {
                  card.style.display = card.querySelector(".item-name").textContent.toLowerCase().includes(term) ? "flex" : "none";
               });
            });
         }

         function clearDisplay(full = false) {
            elements.resultsWrapper.style.display = "none";
            elements.profileSummary.innerHTML = elements.rankingsTableContainer.innerHTML = elements.listsContainer.innerHTML = elements.errorMessage.textContent = "";
            if (full) { elements.backToLeaderboardContainer.style.display = "none"; lastProfileData = null; changeLog = []; renderChangeLog(); }
         }

         function showConfirmDialog(message, onConfirm) {
            const overlay = document.createElement("div");
            overlay.className = "modal-overlay";
            overlay.style.zIndex = "4000";
            overlay.innerHTML = `
               <div class="modal-content" style="max-width: 320px; padding: 24px; text-align: left;">
                  <h3 style="margin-top: 0; font-size: 18px; margin-bottom: 16px; color: var(--md-sys-color-on-surface);">Clear Logs</h3>
                  <div style="font-size: 14px; color: var(--md-sys-color-on-surface); line-height: 1.5;">${message}</div>
                  <div class="dialog-actions">
                     <button class="dialog-btn dialog-cancel">Cancel</button>
                     <button class="dialog-btn dialog-confirm">Confirm</button>
                  </div>
               </div>`;
            document.body.appendChild(overlay);
            const closeDialog = () => overlay.remove();
            overlay.querySelector(".dialog-cancel").addEventListener("click", closeDialog);
            overlay.querySelector(".dialog-confirm").addEventListener("click", () => { onConfirm(); closeDialog(); });
            overlay.addEventListener("click", (e) => { if (e.target === overlay) closeDialog(); });
         }

         function setLoading(L) {
            elements.loader.style.display = L ? "flex" : "none";
            elements.fetchButton.disabled = L;
            if (L) { elements.leaderboardContainer.style.display = elements.backToLeaderboardContainer.style.display = "none"; elements.errorMessage.textContent = ""; }
         }
         function displayError(m) { elements.errorMessage.textContent = m; }

         function aggregateItems(items, title) {
            const agg = {};
            items.forEach(i => {
               const k = title === "Modules" ? `${i.name}-${i.resistance}` : i.name;
               if (!agg[k]) agg[k] = { ...i, timePlayed: 0, scoreEarned: 0, usages: 0, count: 0, detailedGrades: [] };
               agg[k].timePlayed += i.timePlayed || 0;
               agg[k].scoreEarned += i.scoreEarned || 0;
               agg[k].usages += i.usages || 0;
               agg[k].count += i.count || 0;
               if (i.grade > (agg[k].grade || -1)) agg[k].grade = i.grade;
               agg[k].detailedGrades.push({ ...i });
            });
            return Object.values(agg);
         }

         function showDetailedGrades(name, details, title) {
            const isM = title === "Modes Played", isP = title === "Paints";
            const rows = [...details].sort((a, b) => isM ? (a.type || "").localeCompare(b.type || "") : isP ? (a.id || 0) - (b.id || 0) : (a.grade ?? -1) - (b.grade ?? -1))
               .map(d => `<tr><td>${translateText(isM ? d.type || "-" : isP ? `${d.id}` : getGradeName(d.grade))}</td><td>${formatTime(d.timePlayed)}</td><td>${d.scoreEarned?.toLocaleString() || "-"}</td></tr>`).join("");
            const html = `<div class="modal-overlay"><div class="modal-content"><h3>${translateText(name)} - ${isM ? "Data by Type" : isP ? "Data by Version" : "Data by Grade"}</h3><table style="width:100%;"><thead><tr><th>${isM ? "Type" : isP ? "Version" : "Grade"}</th><th>Time</th><th>Experience</th></tr></thead><tbody>${rows}</tbody></table><button class="close-button">Close</button></div></div>`;
            document.body.insertAdjacentHTML("beforeend", html);
            const ov = document.body.lastElementChild;
            ov.addEventListener("click", (e) => { if (e.target === ov || e.target.classList.contains("close-button")) ov.remove(); });
         }

         function getGradeName(grade) { return grade != null && grade > -1 ? `Mk${grade + 1}` : ""; }
      </script>
   </body>
</html>
