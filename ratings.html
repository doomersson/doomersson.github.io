<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <!-- 引入字体和图标 -->
      <link
         href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=M+PLUS+1p:wght@400;500;700&display=swap"
         rel="stylesheet"
      />
      <link
         href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
         rel="stylesheet"
      />
      <title>3D坦克排行榜</title>
      <style>
         :root {
            /* 基础配置 */
            --font-family: "Rubik", "M PLUS 1p", sans-serif;
            --radius-small: 12px;
            --radius-medium: 16px;
            --radius-large: 24px;
            --radius-extra-large: 28px;
            --radius-pill: 9999px;
            --motion-easing: cubic-bezier(0.2, 0, 0, 1);
            --motion-duration: 250ms;
            /* 指定调色板 */
            --color-lime: #76ff33;
            --color-deep-blue: #001926;
            --color-pale-blue: #bfd5ff;
            --color-red: #ff6666;
            --color-surface: #061e2e;
            --color-surface-container: #0c2638;
            --color-surface-container-high: #153247;
         }
         /* 深色主题 */
         [data-theme="dark"] {
            --md-sys-color-background: var(--color-deep-blue);
            --md-sys-color-on-background: #e1e3df;
            --md-sys-color-surface: var(--color-surface);
            --md-sys-color-on-surface: #e1e3df;
            --md-sys-color-surface-container: var(--color-surface-container);
            --md-sys-color-surface-container-high: var(
               --color-surface-container-high
            );
            --md-sys-color-primary: var(--color-lime);
            --md-sys-color-on-primary: #00390a;
            --md-sys-color-primary-container: #005313;
            --md-sys-color-on-primary-container: #96ff68;
            --md-sys-color-secondary: var(--color-pale-blue);
            --md-sys-color-on-secondary: #003256;
            --md-sys-color-secondary-container: #233e52;
            --md-sys-color-on-secondary-container: #d6e8cb;
            --md-sys-color-outline: #586c78;
            --md-sys-color-outline-variant: #344855;
            --md-sys-color-error: var(--color-red);
            --md-sys-color-on-error: #690005;
            --chart-increase: var(--color-lime);
            --chart-decrease: var(--color-red);
            --elevation-shadow: 0 1px 3px 1px rgba(0, 0, 0, 0.2),
               0 1px 2px 0 rgba(0, 0, 0, 0.4);
            --elevation-hover: 0 4px 8px 2px rgba(0, 0, 0, 0.3),
               0 2px 4px 0 rgba(0, 0, 0, 0.4);
         }
         /* 浅色主题 */
         [data-theme="light"] {
            --md-sys-color-background: #f4f8fc;
            --md-sys-color-on-background: #001926;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-on-surface: #001926;
            --md-sys-color-surface-container: #e8f1f8;
            --md-sys-color-surface-container-high: #dce8f2;
            --md-sys-color-primary: #006d2c;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #96ff68;
            --md-sys-color-on-primary-container: #002208;
            --md-sys-color-secondary: #355b78;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #bfd5ff;
            --md-sys-color-on-secondary-container: #001d33;
            --md-sys-color-outline: #747775;
            --md-sys-color-outline-variant: #c4c7c5;
            --md-sys-color-error: #ba1a1a;
            --md-sys-color-on-error: #ffffff;
            --chart-increase: #008000;
            --chart-decrease: #ba1a1a;
            --elevation-shadow: 0 1px 3px 1px rgba(0, 0, 0, 0.05),
               0 1px 2px 0 rgba(0, 0, 0, 0.1);
            --elevation-hover: 0 4px 8px 2px rgba(0, 0, 0, 0.1),
               0 2px 4px 0 rgba(0, 0, 0, 0.1);
         }
         /* ================= 全局去除默认UI与滚动条 ================= */
         * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: var(--font-family);
         }
         ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
         }
         ::-webkit-scrollbar-track {
            background: transparent;
         }
         ::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline-variant);
            border-radius: var(--radius-pill);
            border: 2px solid var(--md-sys-color-background);
         }
         ::-webkit-scrollbar-thumb:hover {
            background: var(--md-sys-color-outline);
         }
         body {
            margin: 0;
            padding: 0;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            transition:
               background-color var(--motion-duration) var(--motion-easing),
               color var(--motion-duration) var(--motion-easing);
            min-height: 100vh;
            font-size: 13px;
            line-height: 1.4;
         }
         .app-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 12px;
            padding-top: 56px;
         }
         /* --- 标题 --- */
         h1 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin: 0 0 24px 0;
            letter-spacing: 0.2px;
            color: var(--md-sys-color-on-background);
         }
         h2 {
            font-size: 16px;
            margin: 12px 0;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
         }
         h3 {
            font-size: 14px;
            margin: 8px 0;
            font-weight: 500;
            color: var(--md-sys-color-secondary);
         }
         a {
            text-decoration: none;
            color: inherit;
         }
         /* --- 顶部栏 --- */
         .top-bar-actions {
            position: fixed;
            top: 12px;
            right: 12px;
            left: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
         }
         .top-bar-actions > * {
            pointer-events: auto;
         }
         .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-pill);
            border: none;
            background-color: var(--md-sys-color-surface-container);
            color: var(--md-sys-color-on-surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--elevation-shadow);
            transition: all 0.2s var(--motion-easing);
         }
         /* 去除位移，仅用颜色层和更强的阴影表达交互 */
         .icon-btn:hover {
            background-color: var(--md-sys-color-surface-container-high);
            box-shadow: var(--elevation-hover);
         }
         .material-symbols-rounded {
            font-size: 20px;
         }
         /* --- 设置悬浮面板 --- */
         .settings-menu {
            display: none;
            position: absolute;
            top: 48px;
            right: 0;
            background: var(--md-sys-color-surface-container-high);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--radius-medium);
            padding: 16px;
            box-shadow: var(--elevation-hover);
            white-space: nowrap;
            z-index: 100;
         }
         .settings-menu.active {
            display: block;
            animation: fadeUp 0.2s ease;
         }
         .setting-item {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 13px;
            cursor: pointer;
            color: var(--md-sys-color-on-surface);
            font-weight: 500;
         }
         .md3-switch {
            position: relative;
            width: 50px;
            height: 30px;
            background-color: var(--md-sys-color-surface-container-high);
            border: 2px solid var(--md-sys-color-outline);
            border-radius: 15px;
            display: inline-flex;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-sizing: border-box;
         }
         .md3-switch::after {
            content: "";
            position: absolute;
            left: 4px;
            width: 14px;
            height: 14px;
            background-color: var(--md-sys-color-outline);
            border-radius: 50%;
            transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
         }
         .setting-item input[type="checkbox"] {
            display: none;
         }
         .setting-item input[type="checkbox"]:checked + .md3-switch {
            background-color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
         }
         .setting-item input[type="checkbox"]:checked + .md3-switch::after {
            left: 24px;
            width: 22px;
            height: 22px;
            background-color: var(--md-sys-color-on-primary);
         }
         #backButton {
            height: 40px;
            padding: 0 16px 0 12px;
            border-radius: var(--radius-pill);
            border: none;
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--elevation-shadow);
            transition: all 0.2s;
         }
         #backButton:hover {
            box-shadow: var(--elevation-hover);
            filter: brightness(1.1);
         }
         #backButton span.material-symbols-rounded {
            font-size: 18px;
         }
         /* --- 表单区域与自定义下拉框 --- */
         .form-container {
            max-width: 360px;
            margin: 0 auto 24px;
            padding: 20px;
            background-color: var(--md-sys-color-surface-container);
            border-radius: var(--radius-extra-large);
            border: 1px solid var(--md-sys-color-outline-variant);
            box-shadow: var(--elevation-shadow);
         }
         .form-group {
            position: relative;
            margin-bottom: 16px;
         }
         .form-group:last-child {
            margin-bottom: 0;
         }
         .form-group label {
            display: block;
            font-size: 11px;
            color: var(--md-sys-color-secondary);
            margin-bottom: 6px;
            font-weight: 600;
            padding-left: 4px;
         }
         .form-group input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            background-color: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--radius-small);
            font-size: 13px;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            transition: all 0.2s;
         }
         .form-group input:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: inset 0 0 0 1px var(--md-sys-color-primary);
            background-color: var(--md-sys-color-surface);
         }
         /* 自定义下拉菜单 UI */
         .custom-select-wrapper {
            position: relative;
            user-select: none;
            width: 100%;
         }
         .custom-select-display {
            background-color: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--radius-small);
            padding: 0 16px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            cursor: pointer;
            transition:
               border-color 0.2s,
               background-color 0.2s;
         }
         .custom-select-display:hover {
            border-color: var(--md-sys-color-outline);
         }
         .custom-select-display.active {
            border-color: var(--md-sys-color-primary);
            box-shadow: inset 0 0 0 1px var(--md-sys-color-primary);
            background-color: var(--md-sys-color-surface);
         }
         .custom-select-options {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--md-sys-color-surface-container-high);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--radius-small);
            box-shadow: var(--elevation-hover);
            z-index: 200;
            overflow: hidden;
            display: none;
         }
         .custom-select-options.active {
            display: block;
            animation: fadeUp 0.15s ease-out;
         }
         .custom-option {
            padding: 12px 16px;
            font-size: 13px;
            cursor: pointer;
            color: var(--md-sys-color-on-surface);
            transition: background 0.15s;
         }
         .custom-option:hover {
            background: var(--md-sys-color-surface-container);
         }
         .custom-option.disabled {
            color: var(--md-sys-color-outline);
            pointer-events: none;
         }
         /* 修改后：将选择器改为 #fetchButton */
         #fetchButton {
            width: 100%;
            height: 42px;
            border-radius: var(--radius-pill);
            border: none;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--elevation-shadow);
         }
         #fetchButton:hover:not(:disabled) {
            box-shadow:
               var(--elevation-hover),
               0 0 16px rgba(118, 255, 51, 0.4);
         }
         [data-theme="light"] #fetchButton:hover:not(:disabled) {
            box-shadow:
               var(--elevation-hover),
               0 0 16px rgba(0, 109, 44, 0.4);
         }
         #fetchButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: var(--md-sys-color-outline);
            box-shadow: none;
         }
         .error-message {
            color: var(--md-sys-color-error);
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            min-height: 16px;
            font-weight: 600;
         }
         /* --- 搜索历史 --- */
         .search-history {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--md-sys-color-surface-container-high);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--radius-small);
            box-shadow: var(--elevation-hover);
            z-index: 10;
            max-height: 220px;
            overflow-y: auto;
         }
         .search-history.active {
            display: block;
            animation: fadeUp 0.2s ease;
         }
         .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            transition: background 0.2s;
         }
         .history-item:last-child {
            border-bottom: none;
         }
         .history-item:hover {
            background: var(--md-sys-color-surface-container);
         }
         .history-item-text {
            flex-grow: 1;
            font-size: 13px;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
         }
         .history-item-server {
            font-size: 10px;
            color: var(--md-sys-color-on-secondary-container);
            background: var(--md-sys-color-secondary-container);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: 700;
         }
         .history-delete {
            background: none;
            border: none;
            color: var(--md-sys-color-outline);
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
         }
         .history-delete:hover {
            color: var(--md-sys-color-error);
         }
         /* --- 监测按钮 --- */
         .monitor-container {
            text-align: center;
            margin-bottom: 16px;
         }
         #monitorButton {
            height: 44px;
            padding: 0 28px;
            border-radius: var(--radius-pill);
            border: none;
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--elevation-shadow);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
         }
         #monitorButton:hover:not(:disabled) {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            box-shadow:
               var(--elevation-hover),
               0 0 16px rgba(118, 255, 51, 0.3);
         }
         #monitorButton.monitoring {
            background-color: var(--md-sys-color-error);
            color: var(--md-sys-color-on-error);
         }
         #monitorButton.monitoring:hover {
            box-shadow:
               var(--elevation-hover),
               0 0 16px rgba(255, 102, 102, 0.3);
         }
         /* --- 选项卡 --- */
         .tabs {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 16px;
            padding: 4px;
            background-color: var(--md-sys-color-surface-container);
            border-radius: var(--radius-pill);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--md-sys-color-outline-variant);
         }
         .tab-button {
            padding: 8px 20px;
            background: transparent;
            border: none;
            border-radius: var(--radius-pill);
            color: var(--md-sys-color-on-surface);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
         }
         .tab-button.active {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            box-shadow: 0 4px 12px rgba(118, 255, 51, 0.3);
         }
         [data-theme="light"] .tab-button.active {
            box-shadow: 0 4px 12px rgba(0, 109, 44, 0.2);
         }
         .tab-content {
            display: none;
            animation: fadeUp 0.2s;
         }
         .tab-content.active {
            display: block;
         }
         /* --- 数据概览卡片 --- */
         #profileSummary {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
         }
         .summary-item {
            display: flex;
            flex-direction: column;
            padding: 12px 14px;
            background-color: var(--md-sys-color-surface-container);
            border-radius: var(--radius-medium);
            border: 1px solid var(--md-sys-color-outline-variant);
            flex: 1 0 auto;
            width: auto;
            min-width: 100px;
            transition:
               box-shadow 0.2s,
               border-color 0.2s;
         }
         .summary-item:hover {
            box-shadow: var(--elevation-hover);
            border-color: var(--md-sys-color-outline);
         }
         .summary-item.full-width {
            flex-basis: 100%;
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: none;
            border-radius: var(--radius-large);
         }
         .summary-item.full-width .summary-label {
            color: var(--md-sys-color-on-primary-container);
            font-size: 11px;
            opacity: 0.85;
            margin-bottom: 4px;
         }
         .summary-item.full-width .summary-value {
            font-size: 24px;
            color: var(--md-sys-color-on-primary-container);
            font-weight: 700;
            letter-spacing: -0.5px;
         }
         .summary-label {
            font-size: 10px;
            color: var(--md-sys-color-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
         }
         .summary-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
            line-height: 1.2;
            white-space: nowrap;
         }
         .summary-value.premium {
            color: var(--md-sys-color-primary);
            text-shadow: 0 0 12px rgba(118, 255, 51, 0.4);
         }
         /* --- 列表与网格 --- */
         .list-section {
            margin-bottom: 24px;
         }
         .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
         }
         .list-title {
            font-size: 14px;
            margin-bottom: 0;
            font-weight: 700;
            border-left: 4px solid var(--md-sys-color-primary);
            padding-left: 10px;
            color: var(--md-sys-color-on-background);
            border-radius: 2px;
         }
         .list-container {
            display: flex;
            padding: 4px 4px 12px 4px;
            gap: 12px;
            scroll-snap-type: x mandatory;
            overflow-x: auto;
         }
         .data-card {
            flex: 0 0 160px;
            scroll-snap-align: start;
            background-color: var(--md-sys-color-surface-container);
            padding: 14px 12px;
            border-radius: var(--radius-large);
            display: flex;
            flex-direction: column;
            text-align: center;
            border: 1px solid var(--md-sys-color-outline-variant);
            transition:
               box-shadow 0.2s,
               border-color 0.2s;
         }
         .data-card:hover {
            box-shadow: var(--elevation-hover);
            border-color: var(--md-sys-color-primary);
         }
         .data-card.changed {
            border: 2px solid var(--md-sys-color-primary);
            background-color: rgba(118, 255, 51, 0.05);
         }
         .item-name {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
         }
         .item-image {
            width: 56px;
            height: 56px;
            object-fit: contain;
            margin: 0 auto 10px;
            filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.2));
         }
         .data-card div {
            font-size: 11px;
            margin: 2px 0;
            color: var(--md-sys-color-on-surface-variant);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
         }
         .data-card strong {
            color: var(--md-sys-color-on-surface);
            font-weight: 600;
         }
         .grade-badge {
            display: inline-block !important;
            width: fit-content !important;
            margin: 4px auto 0 !important;
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px !important;
            font-weight: 700;
         }
         .view-data-button {

         // --- 全局水波纹事件 (纯正 MD3 Ripple 交互) ---
         document.addEventListener("mousedown", function (e) {
            const btn = e.target.closest(
               "button, .tab-button, .history-item, .custom-select-display, .custom-option, .setting-item",
            );
            if (!btn) return;
            // 确保具有定位属性
            if (window.getComputedStyle(btn).position === "static") {
               btn.style.position = "relative";
            }
            btn.style.overflow = "hidden";

            const rect = btn.getBoundingClientRect();
            const ripple = document.createElement("span");
            const diameter = Math.max(rect.width, rect.height);
            const radius = diameter / 2;

            ripple.style.width = ripple.style.height = `${diameter}px`;
            ripple.style.left = `${e.clientX - rect.left - radius}px`;
            ripple.style.top = `${e.clientY - rect.top - radius}px`;
            ripple.className = "md-ripple-anim";

            btn.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
         });

         // 带有小数位格式的时间显示，还原真实文字描述逻辑
         function formatTime(ms) {
            if (ms == null || ms <= 0) return "-";
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            const msPart = ms % 1000;

            const parts = [];
            if (isPreciseTime) {
               if (h > 0) parts.push(`${h} ${T.hr}`);
               if (m > 0 || h > 0) parts.push(`${m} ${T.min}`);
               // 组合秒和毫秒，保留三位小数输出 (例如：17.698 秒)
               const secWithMs = (s + msPart / 1000).toFixed(3);
               parts.push(`${secWithMs} ${T.sec}`);
            } else {
               if (h > 0) parts.push(`${h} ${T.hr}`);
               if (m > 0 || h > 0) parts.push(`${m} ${T.min}`);
               if (h === 0 && m === 0) return T.lt1m;
            }
            return parts.join(" ");
         }

         function translateText(text) {
            if (typeof text !== "string" || !text) return text;
            let translated = text;
            if (isChinese) {
               Object.keys(TRANSLATION_MAP)
                  .sort((a, b) => b.length - a.length)
                  .forEach((key) => {
                     const regex = new RegExp(key, "gi");
                     if (regex.test(translated))
                        translated = translated.replace(
                           regex,
                           TRANSLATION_MAP[key],
                        );
                  });
               return translated.replace(/[_\-\s]/g, "");
            } else
               return translated
                  .toLowerCase()
                  .split(/[_\-\s]+/)
                  .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
                  .join(" ");
         }

         async function fetchStarsLeaderboardData() {
            const apiUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent("https://pages.tankionline.com/challenge-accepted")}`;
            try {
               const response = await fetch(apiUrl);
               if (!response.ok) throw new Error("Status " + response.status);
               const htmlText = await response.text();
               const doc = new DOMParser().parseFromString(
                  htmlText,
                  "text/html",
               );
               const parseList = (selector, prizeParser) => {
                  const list = doc.querySelector(selector);
                  if (!list) return [];
                  const players = [];
                  list.querySelectorAll("ul.list-content li").forEach((li) => {
                     const name = li.querySelector(".name")?.textContent.trim();
                     const value = parseInt(
                        li
                           .querySelector(".stars")
                           ?.textContent.trim()
                           .replace(/\s/g, ""),
                        10,
                     );
                     if (name && !isNaN(value)) {
                        const player = { uid: name, value };
                        if (prizeParser) player.prizes = prizeParser(li);
                        players.push(player);
                     }
                  });
                  return players;
               };
               const prizeParser = (li) =>
                  Array.from(
                     li.querySelector(".prizes")?.querySelectorAll(".prize") ||
                        [],
                  )
                     .map((p) =>
                        Array.from(p.classList).find((c) => c !== "prize"),
                     )
                     .filter(Boolean);
               return {
                  stars_current: parseList(".rating-list.active"),
                  stars_previous: parseList(
                     ".rating-list.old-list",
                     prizeParser,
                  ),
               };
            } catch (e) {
               return { stars_current: [], stars_previous: [] };
            }
         }

                  currentServer,

               displayError(error.message);

         async function fetchProfileData(server, username) {
            const targetUrl = `${API_CONFIG.baseUrls[server]}?user=${encodeURIComponent(username)}&lang=${isChinese ? "cn" : "en"}&_=${Date.now()}`;
            const response = await fetch(
               `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
            );
            if (!response.ok) throw new Error(response.status);
            const data = await response.json();
            if (data?.responseType === "NOT_FOUND")
               throw new Error(T.error_not_found);
            return data.response;
         }

         function logChange(item, oldV, newV) {

            const timeOptions = {
               hour12: !isChinese,
               month: "short",
               day: "numeric",
               hour: "2-digit",
               minute: "2-digit",
               second: "2-digit",
            };

            changeLog.unshift({
               timestamp: new Date().toLocaleString(
                  isChinese ? "zh-CN" : "en-US",
                  timeOptions,
               ),
               item: translateText(item),
               oldValue:
                  oldV?.toLocaleString(undefined, {
                     maximumFractionDigits: 3,
                  }) || "N/A",
               newValue:
                  newV?.toLocaleString(undefined, {
                     maximumFractionDigits: 3,
                  }) || "N/A",
            });

            // 限制最多保存 100 条记录，防止塞满本地存储空间
            if (changeLog.length > 100) changeLog.pop();

            // --- 写入 LocalStorage ---
            const logKey = `${currentServer}_${currentUsername.toLowerCase()}`;
            const allLogs = JSON.parse(
               localStorage.getItem("tanki_logs") || "{}",
            );
            allLogs[logKey] = changeLog;
            localStorage.setItem("tanki_logs", JSON.stringify(allLogs));

            renderChangeLog();
         }

         function renderChangeLog() {
            if (changeLog.length === 0) {
               elements.changeLogContainer.innerHTML = `<p class="no-data-message">${T.no_log}</p>`;
               return;
            }

            // 头部：垃圾桶按钮移除了内联的 background-color，使用了新加的 trash-btn 类
            const headerHtml = `
               <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--md-sys-color-outline-variant);">
                  <div style="font-size: 14px; font-weight: 700; color: var(--md-sys-color-on-background);">
                     <span class="material-symbols-rounded" style="font-size:18px; vertical-align:middle; margin-right:4px;">history</span>
                     ${T.tab_log} (${changeLog.length})
                  </div>
                  <button id="clearLogBtn" class="icon-btn trash-btn" title="${T.clear_log || "清空日志"}">
                     <span class="material-symbols-rounded" style="font-size: 20px;">delete</span>
                  </button>
               </div>`;

            // 列表内容
            const listHtml = changeLog
               .map(
                  (log) => `
               <div class="log-entry" style="display:flex; gap:12px; margin-bottom:12px; align-items: flex-start; padding: 12px; background-color: var(--md-sys-color-surface-container-high); border-radius: var(--radius-small); border: 1px solid var(--md-sys-color-outline-variant);">
                  <div class="log-icon-wrapper" style="color:var(--md-sys-color-primary); margin-top:2px;">
                     <span class="material-symbols-rounded" style="font-size:20px;">update</span>
                  </div>
                  <div class="log-text-content">
                     <div class="log-timestamp" style="font-size:11px; color:var(--md-sys-color-secondary); margin-bottom: 4px;">${log.timestamp}</div>
                     <div class="log-details" style="font-size:13px; color:var(--md-sys-color-on-surface);">
                        <strong>${log.item}</strong> ${isChinese ? "从" : "from"} <span style="font-weight: 600; color: var(--md-sys-color-outline);">${log.oldValue}</span> <span style="color:var(--md-sys-color-primary); margin: 0 4px;">➔</span> <span style="font-weight: 600;">${log.newValue}</span>
                     </div>
                  </div>
               </div>`,
               )
               .join("");

            elements.changeLogContainer.innerHTML = headerHtml + listHtml;

            // 绑定垃圾桶的清除事件，使用自定义弹窗 showConfirmDialog 替代原生 confirm
            document
               .getElementById("clearLogBtn")
               .addEventListener("click", () => {
                  showConfirmDialog(
                     T.confirm_clear ||
                        "确定要清空该玩家的所有变更记录吗？无法恢复。",
                     () => {
                        changeLog = [];
                        const allLogs = JSON.parse(
                           localStorage.getItem("tanki_logs") || "{}",
                        );
                        const logKey = `${currentServer}_${currentUsername.toLowerCase()}`;
                        delete allLogs[logKey];
                        localStorage.setItem(
                           "tanki_logs",
                           JSON.stringify(allLogs),
                        );
                        renderChangeLog();
                     },
                  );
               });
         }

         function displayProfileSummary(profile, oldProfile) {
            const getStat = (p, key, old, label) => {
               const v = p?.[key] ?? 0;
               if (!old) return { v: v.toLocaleString(), c: "" };
               const ov = old?.[key] ?? 0;
               if (v !== ov) logChange(label || key, ov, v);
               return { v: v.toLocaleString(), c: createChangeSpan(v - ov) };
            };
            const s = {
               k: getStat(profile, "kills", oldProfile, T.kill),
               d: getStat(profile, "deaths", oldProfile, T.death),
               sc: getStat(profile, "score", oldProfile, T.label_score),
               g: getStat(profile, "gearScore", oldProfile, T.label_gear),
               c: getStat(
                  profile,
                  "earnedCrystals",
                  oldProfile,
                  T.label_crystals,
               ),
               gb: getStat(profile, "caughtGolds", oldProfile, T.label_golds),
            };
            const tt = (profile.hullsPlayed || []).reduce(
               (t, h) => t + (h.timePlayed || 0),
               0,
            );
            const ts = (profile.suppliesUsage || []).reduce(
               (t, sp) => t + (sp.usages || 0),
               0,
            );
            const rankN = profile.rank || 1;
            elements.profileSummary.innerHTML =
               `<div class="summary-item full-width"><span class="summary-label">${T.label_nickname}</span><span class="summary-value">${profile.name || "N/A"}</span></div>` +
               [
                  {
                     l: T.rank,
                     v:
                        rankN > 0
                           ? rankN <= RANKS.length
                              ? RANKS[rankN - 1]
                              : `${RANKS[RANKS.length - 1]} ${rankN - RANKS.length}`
                           : T.unknown_rank,
                  },
                  {
                     l: T.label_score,
                     v: `${s.sc.v}${s.sc.c} / ${profile.scoreNext?.toLocaleString() || 0}`,
                  },
                  {
                     l: T.label_vip,
                     v: profile.hasPremium ? T.vip_active : T.vip_inactive,
                     p: profile.hasPremium,
                  },
                  { l: T.label_gear, v: `${s.g.v}${s.g.c}` },
                  { l: T.label_kd, v: `${s.k.v}${s.k.c} / ${s.d.v}${s.d.c}` },
                  {
                     l: T.label_ratio,
                     v:
                        profile.deaths === 0
                           ? "∞"
                           : (profile.kills / profile.deaths).toFixed(2),
                  },
                  { l: T.label_time, v: formatTime(tt) },
                  { l: T.label_supplies, v: ts.toLocaleString() },
                  { l: T.label_crystals, v: `${s.c.v}${s.c.c}` },
                  { l: T.label_golds, v: `${s.gb.v}${s.gb.c}` },
               ]
                  .map(
                     (i) =>
                        `<div class="summary-item"><span class="summary-label">${i.l}</span><span class="summary-value ${i.p ? "premium" : ""}">${i.v}</span></div>`,
                  )
                  .join("");
         }

         function displayRankingsTable(newData, oldData) {
            const currentRating = newData.rating || {},
               prevRating = newData.previousRating || {},
               oldRating = oldData?.rating;
            const rows = [
               { k: "score", n: T.cat_score },
               { k: "golds", n: T.cat_golds },
               { k: "crystals", n: T.cat_crystals },
               { k: "efficiency", n: T.cat_eff },
            ]
               .map((c) => {
                  const cur = currentRating[c.k] || {},
                     prv = prevRating[c.k] || {},
                     old = oldRating?.[c.k],
                     cv =
                        c.k === "efficiency" && cur.value > 0
                           ? cur.value / 1000
                           : cur.value,
                     ov =
                        c.k === "efficiency" && old?.value > 0
                           ? old.value / 1000
                           : old?.value;
                  let pHTML = "",
                     vHTML = "";
                  if (old) {
                     if (
                        cur.position > 0 &&
                        old.position > 0 &&
                        cur.position !== old.position
                     ) {
                        pHTML = createChangeSpan(old.position - cur.position);
                        logChange(
                           `${c.n} ${T.th_cur_rank}`,
                           old.position,
                           cur.position,
                        );
                     }
                     if (cv !== ov) {
                        vHTML = createChangeSpan(cv - ov);
                        logChange(`${c.n} ${T.th_cur_val}`, ov, cv);
                     }
                  }
                  const fmt = (v) =>
                     v == -1 || v == null
                        ? "-"
                        : v.toLocaleString(undefined, {
                             maximumFractionDigits:
                                c.k === "efficiency" ? 3 : 0,
                          });
                  return `<tr><td>${c.n}</td><td>${fmt(cur.position)}${pHTML}</td><td>${fmt(cv)}${vHTML}</td><td>${fmt(prv.position)}</td><td>${fmt(c.k === "efficiency" && prv.value > 0 ? prv.value / 1000 : prv.value)}</td></tr>`;
               })
               .join("");
            elements.rankingsTableContainer.innerHTML = `<h3 class="list-title" style="text-align:center;margin-bottom:12px;border:none;padding:0;">${T.weekly_rank_title}</h3><table cellpadding="0" cellspacing="0"><thead><tr><th>${T.th_cat}</th><th>${T.th_cur_rank}</th><th>${T.th_cur_val}</th><th>${T.th_prev_rank}</th><th>${T.th_prev_val}</th></tr></thead><tbody>${rows}</tbody></table>`;
         }

         function displayAllLists(newData, oldData) {
            elements.listsContainer.innerHTML = "";
            LIST_DATA_CONFIGS.forEach((config) => {
               const newItems = newData[config.key] || [],
                  oldItems = oldData?.[config.key] || [];
               const section = document.createElement("div");
               section.className = "list-section";

               const header = document.createElement("div");
               header.className = "list-header";
               const title = document.createElement("h3");
               title.className = "list-title";
               title.textContent = config.title;
               header.appendChild(title);
               if (newItems.length > 0) {
                  const btn = document.createElement("button");
                  btn.className = "icon-btn expand-btn";
                  btn.innerHTML =
                     '<span class="material-symbols-rounded">fullscreen</span>';
                  btn.onclick = () =>
                     openFullscreenList(newItems, oldItems, config.title);
                  header.appendChild(btn);
               }
               section.appendChild(header);

               if (!newItems.length) {
                  const p = document.createElement("p");
                  p.className = "no-data-message";
                  p.textContent = T.no_data_lb;
                  section.appendChild(p);
               } else {
                  const container = document.createElement("div");
                  container.className = "list-container";
                  displayListData(newItems, oldItems, container, config.title);
                  section.appendChild(container);
               }
               elements.listsContainer.appendChild(section);
            });
         }

         function displayListData(newItems, oldItems, container, title) {
            const aggNew = aggregateItems(newItems, title),
               oldMap = new Map(
                  aggregateItems(oldItems, title).map((i) => [i.name, i]),
               );
            aggNew.forEach((item) => {
               item.changes = {};
               item.hasChanged = false;
               const oldI = oldMap.get(item.name);
               if (oldI)
                  ["scoreEarned", "timePlayed", "usages", "count"].forEach(
                     (p) => {
                        if ((item[p] || 0) > (oldI[p] || 0)) {
                           item.changes[p] = item.hasChanged = true;
                           logChange(
                              `${item.name} ` +
                                 (p === "scoreEarned"
                                    ? T.cat_score
                                    : p === "timePlayed"
                                      ? T.th_time
                                      : T.count),
                              oldI[p],
                              item[p],
                           );
                        }
                     },
                  );
            });
            aggNew
               .sort(
                  (a, b) =>
                     b.hasChanged - a.hasChanged ||
                     (b.timePlayed || b.usages || 0) -
                        (a.timePlayed || a.usages || 0),
               )
               .forEach((item) => {
                  const div = document.createElement("div");
                  div.className = `data-card ${item.hasChanged ? "changed" : ""}`;
                  let img = item.imageUrl
                     ? item.imageUrl
                          .replace(
                             /s\.(eu\.tankionline|3dtank)\.com/g,
                             isChinese
                                ? "res.3dtank.com"
                                : "s.eu.tankionline.com",
                          )
                          .replace(/\.tnk/g, ".webp")
                     : null;
                  if (title === T.list_modules && img)
                     img = img.replace(/\.webp$/, ".svg");

                  const cf = (l, v, p) =>
                     `<div class="${item.changes[p] ? "field-changed" : ""}"><strong>${l}:</strong> ${v}${item.changes[p] ? createChangeSpan((item[p] || 0) - (oldMap.get(item.name)?.[p] || 0)) : ""}</div>`;
                  let h = `<div class="item-name">${translateText(item.name) || "-"}</div>`;
                  if (img)
                     h += `<img src="${img}" class="item-image" loading="lazy" />`;
                  if (item.properties != null)
                     h += cf(
                        T.prop,
                        translateText(item.properties?.toLocaleString()),
                        "properties",
                     );
                  if (item.grade != null && item.grade != -1)
                     h += `<div class="grade-badge">${getGradeName(item.grade)}</div>`;
                  if (title !== T.list_supplies && title !== T.list_presents) {
                     if (item.timePlayed > 0) {
                        if (item.scoreEarned != null)
                           h += cf(
                              T.label_score,
                              item.scoreEarned?.toLocaleString(),
                              "scoreEarned",
                           );
                        h += cf(
                           T.th_time,
                           formatTime(item.timePlayed),
                           "timePlayed",
                        );
                     } else
                        h += `<div style="font-size: 11px; color: var(--md-sys-color-outline); margin-top: 4px; font-style: italic;">${T.not_played}</div>`;
                  }
                  if (item.count != null && title === T.list_presents)
                     h += cf(T.count, item.count?.toLocaleString(), "count");
                  if (item.usages != null && title === T.list_supplies)
                     h += cf(T.count, item.usages?.toLocaleString(), "usages");
                  div.innerHTML = h;
                  if (item.detailedGrades?.length > 1) {
                     const btn = document.createElement("button");
                     btn.className = "view-data-button";
                     btn.textContent =
                        title === T.list_modes
                           ? T.view_types
                           : title === T.list_paints
                             ? T.view_versions
                             : T.view_grades;
                     btn.onclick = () =>
                        showDetailedGrades(
                           item.name,
                           item.detailedGrades,
                           title,
                        );
                     div.appendChild(btn);
                  }
                  container.appendChild(div);
               });
         }

         // --- 全屏搜索与网格展示 ---
         function openFullscreenList(newItems, oldItems, title) {
            const container = document.createElement("div");
            container.className = "fullscreen-grid";
            displayListData(newItems, oldItems, container, title);

            const html = `
            <div class="fullscreen-modal" id="fsModal">
               <div class="fs-header">
                  <button class="icon-btn close-fs-btn" style="width: 40px; height: 40px; background: transparent; box-shadow: none; flex-shrink: 0;">
                     <span class="material-symbols-rounded">arrow_back</span>
                  </button>
                  <div class="fs-search-wrapper">
                     <span class="material-symbols-rounded">search</span>
                     <input type="text" id="fsSearchInput" placeholder="${T.search} ${title}..." autocomplete="off" />
                  </div>
               </div>
               <div id="fsContainer" style="flex-grow: 1; overflow-y: auto;"></div>
            </div>`;
            document.body.insertAdjacentHTML("beforeend", html);

            const overlay = document.getElementById("fsModal");
            document.getElementById("fsContainer").appendChild(container);

            overlay.querySelector(".close-fs-btn").onclick = () =>
               overlay.remove();

            const searchInput = overlay.querySelector("#fsSearchInput");
            searchInput.addEventListener("input", (e) => {
               const term = e.target.value.toLowerCase().trim();
               const cards = container.querySelectorAll(".data-card");
               cards.forEach((card) => {
                  const itemName = card
                     .querySelector(".item-name")
                     .textContent.toLowerCase();
                  if (itemName.includes(term)) card.style.display = "flex";
                  else card.style.display = "none";
               });
            });
         }

         function clearDisplay(full = false) {
            elements.resultsWrapper.style.display = "none";
            elements.profileSummary.innerHTML =
               elements.rankingsTableContainer.innerHTML =
               elements.listsContainer.innerHTML =
               elements.errorMessage.textContent =
                  "";
            if (full) {
               elements.backToLeaderboardContainer.style.display = "none";
               lastProfileData = null;
               changeLog = [];
               renderChangeLog();
            }
         }
         function showConfirmDialog(message, onConfirm) {
            const overlay = document.createElement("div");
            overlay.className = "modal-overlay";
            overlay.style.zIndex = "4000"; // 确保在最顶层

            const cancelText = isChinese ? "取消" : "Cancel";
            const confirmText = isChinese ? "确定" : "Confirm";

            overlay.innerHTML = `
               <div class="modal-content" style="max-width: 320px; padding: 24px; text-align: left;">
                  <h3 style="margin-top: 0; font-size: 18px; margin-bottom: 16px; color: var(--md-sys-color-on-surface);">
                     ${isChinese ? "清空记录" : "Clear Logs"}
                  </h3>
                  <div style="font-size: 14px; color: var(--md-sys-color-on-surface); line-height: 1.5;">
                     ${message}
                  </div>
                  <div class="dialog-actions">
                     <button class="dialog-btn dialog-cancel">${cancelText}</button>
                     <button class="dialog-btn dialog-confirm">${confirmText}</button>
                  </div>
               </div>
            `;

            document.body.appendChild(overlay);

            const btnCancel = overlay.querySelector(".dialog-cancel");
            const btnConfirm = overlay.querySelector(".dialog-confirm");

            const closeDialog = () => overlay.remove();

            btnCancel.addEventListener("click", closeDialog);
            btnConfirm.addEventListener("click", () => {
               onConfirm();
               closeDialog();
            });

            // 点击弹窗外部背景也可以关闭
            overlay.addEventListener("click", (e) => {
               if (e.target === overlay) closeDialog();
            });
         }
         function setLoading(L) {
            elements.loader.style.display = L ? "flex" : "none";
            elements.fetchButton.disabled = L;
            if (L) {
               elements.leaderboardContainer.style.display =
                  elements.backToLeaderboardContainer.style.display = "none";
               elements.errorMessage.textContent = "";
            }
         }
         function displayError(m) {
            elements.errorMessage.textContent = m;
         }
         function aggregateItems(items, title) {
            const agg = {};
            items.forEach((i) => {
               const k =
                  title === T.list_modules
                     ? `${i.name}-${i.resistance}`
                     : i.name;
               if (!agg[k])
                  agg[k] = {
                     ...i,
                     timePlayed: 0,
                     scoreEarned: 0,
                     usages: 0,
                     count: 0,
                     detailedGrades: [],
                  };
               agg[k].timePlayed += i.timePlayed || 0;
               agg[k].scoreEarned += i.scoreEarned || 0;
               agg[k].usages += i.usages || 0;
               agg[k].count += i.count || 0;
               if (i.grade > (agg[k].grade || -1)) agg[k].grade = i.grade;
               agg[k].detailedGrades.push({ ...i });
            });
            return Object.values(agg);
         }

         function showDetailedGrades(name, details, title) {
            const isM = title === T.list_modes,
               isP = title === T.list_paints;
            const rows = [...details]
               .sort((a, b) =>
                  isM
                     ? (a.type || "").localeCompare(b.type || "")
                     : isP
                       ? (a.id || 0) - (b.id || 0)
                       : (a.grade ?? -1) - (b.grade ?? -1),
               )
               .map(
                  (d) =>
                     `<tr><td>${translateText(isM ? d.type || "-" : isP ? `${d.id}` : getGradeName(d.grade))}</td><td>${formatTime(d.timePlayed)}</td><td>${d.scoreEarned?.toLocaleString() || "-"}</td></tr>`,
               )
               .join("");
            const html = `<div class="modal-overlay"><div class="modal-content"><h3>${translateText(name)} - ${isM ? T.modal_types : isP ? T.modal_versions : T.modal_grades}</h3><table style="width:100%;"><thead><tr><th>${isM ? T.th_type : isP ? T.th_ver : T.th_grade}</th><th>${T.th_time}</th><th>${T.th_exp}</th></tr></thead><tbody>${rows}</tbody></table><button class="close-button">${T.close}</button></div></div>`;
            document.body.insertAdjacentHTML("beforeend", html);
            const ov = document.body.lastElementChild;
            ov.addEventListener("click", (e) => {
               if (
                  e.target === ov ||
                  e.target.classList.contains("close-button")
               )
                  ov.remove();
            });
         }
         function getGradeName(grade) {
            return grade != null && grade > -1 ? `Mk${grade + 1}` : "";
         }
      </script>
   </body>
</html>
