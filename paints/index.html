<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanki — Paint Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <div class="topbar">
    <span class="logo">tanki.paints</span>
    <div class="search-wrap">
      <input class="search-input" id="userInput" type="text" placeholder="username">
      <button class="search-btn" onclick="loadProfile()">run</button>
    </div>
    <span class="status" id="statusMsg">waiting for input_</span>
  </div>

  <div class="hero" id="heroSection">
    <div class="player-name" id="playerName"></div>
    <div class="player-sub">paint collection // eu server</div>
  </div>

  <div class="stats-row" id="statsRow">
    <span><span class="stat-lbl">paints:</span> <span class="stat-val" id="statCount"></span></span>
    <span><span class="stat-lbl">score:</span> <span class="stat-val" id="statScore"></span></span>
    <span><span class="stat-lbl">time:</span> <span class="stat-val" id="statTime"></span></span>
    <span><span class="stat-lbl">top:</span> <span class="stat-val" id="statTop"></span></span>
  </div>

  <div class="sort-bar" id="sortBar">
    <span class="sort-lbl">sort:</span>
    <button class="sort-btn active" onclick="setSort('time', this)">time</button>
    <button class="sort-btn" onclick="setSort('name', this)">name</button>
    <button class="sort-btn" onclick="setSort('score', this)">score</button>
  </div>

  <div class="gallery" id="gallery"></div>

</div>
<script>
let currentPaints = [];
let currentSort = 'time';
const PROXY = 'https://api.codetabs.com/v1/proxy?quest=';

function tnkToWebp(url) { return url ? url.replace(/\.tnk$/, '.webp') : ''; }

function gradeStars(grade) {
  if (grade < 0) return '★★★★★';
  const f = Math.max(0, Math.min(5, grade));
  return '★'.repeat(f) + '☆'.repeat(5 - f);
}

function formatMs(ms) {
  if (!ms) return '—';
  const m = Math.floor(ms / 60000), h = Math.floor(m / 60);
  return h > 0 ? h + 'h ' + (m % 60) + 'm' : m + 'm';
}

function setSort(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function getSorted(paints) {
  return [...paints].sort((a, b) => {
    if (currentSort === 'name')  return a.name.localeCompare(b.name);
    if (currentSort === 'score') return b.scoreEarned - a.scoreEarned;
    if (currentSort === 'time')  return b.timePlayed - a.timePlayed;
    if (currentSort === 'grade') return b.grade - a.grade;
    return 0;
  });
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const sorted = getSorted(currentPaints);
  if (!sorted.length) {
    gallery.innerHTML = '<div class="empty">no paints found</div>';
    return;
  }
  gallery.innerHTML = sorted.map((p, i) => `
    <div class="paint-card">
      <span class="rank-num">#${i + 1}</span>
      <img class="paint-img" src="${tnkToWebp(p.imageUrl)}" alt="${p.name}" onerror="this.style.opacity=0.15">
      <div class="paint-name">${p.name}</div>
      <div class="paint-grade">${gradeStars(p.grade)}</div>
      <div class="paint-stats">
        <div class="pstat"><span class="k">score</span><span class="v ${!p.scoreEarned ? 'zero' : ''}">${p.scoreEarned > 0 ? p.scoreEarned.toLocaleString() : '—'}</span></div>
        <div class="pstat"><span class="k">time</span><span class="v ${!p.timePlayed ? 'zero' : ''}">${p.timePlayed > 0 ? formatMs(p.timePlayed) : '—'}</span></div>
      </div>
    </div>
  `).join('');
}

function renderStats(paints, name) {
  const totalScore = paints.reduce((s, p) => s + p.scoreEarned, 0);
  const totalTime  = paints.reduce((s, p) => s + p.timePlayed, 0);
  const top = [...paints].sort((a, b) => b.scoreEarned - a.scoreEarned)[0];
  document.getElementById('playerName').textContent = name;
  document.getElementById('statCount').textContent  = paints.length;
  document.getElementById('statScore').textContent  = totalScore > 0 ? totalScore.toLocaleString() : '0';
  document.getElementById('statTime').textContent   = totalTime > 0 ? formatMs(totalTime) : '0h';
  document.getElementById('statTop').textContent    = top && top.scoreEarned > 0 ? top.name : '—';
}

async function loadProfile() {
  const user = document.getElementById('userInput').value.trim();
  if (!user) return;
  const statusEl = document.getElementById('statusMsg');
  statusEl.className = 'status';
  statusEl.textContent = 'fetching ' + user + '...';
  try {
    const res = await fetch(PROXY + `https://ratings.tankionline.com/api/eu/profile/?user=${encodeURIComponent(user)}&lang=en`);
    const data = await res.json();
    if (data.responseType !== 'OK') throw new Error('user not found');
    currentPaints = data.response.paintsPlayed || [];
    renderStats(currentPaints, data.response.name);
    renderGallery();
    document.getElementById('heroSection').style.display = '';
    document.getElementById('statsRow').style.display = '';
    document.getElementById('sortBar').style.display = '';
    statusEl.className = 'status ok';
    statusEl.textContent = 'loaded: ' + data.response.name;
    history.pushState(null, '', '?user=' + encodeURIComponent(data.response.name));
  } catch(e) {
    statusEl.className = 'status err';
    statusEl.textContent = 'error: ' + e.message;
  }
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadProfile();
});

// Landing state
document.getElementById('heroSection').style.display = 'none';
document.getElementById('statsRow').style.display = 'none';
document.getElementById('sortBar').style.display = 'none';
document.getElementById('gallery').innerHTML = '<div class="empty">search a user to view their paint collection</div>';

// Auto-load from URL on page load
const params = new URLSearchParams(window.location.search);
const userFromUrl = params.get('user');
if (userFromUrl) {
  document.getElementById('userInput').value = userFromUrl;
  loadProfile();
}
</script>
</body>
</html>
